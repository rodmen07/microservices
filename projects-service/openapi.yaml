openapi: 3.0.3
info:
  title: projects-service API
  version: 1.16.1
  description: |
    Client portal projects service for the InfraPortal platform. Rust
    (axum 0.8) with PostgreSQL persistence. Manages projects, milestones,
    deliverables, portal messages, external links, and synced email threads,
    plus health and readiness probes.

    This spec documents the API contract as implemented in code
    (src/lib/router.rs, src/lib/handlers/, src/lib/models.rs, src/lib/auth.rs).
    All runtime endpoints have been offline since 2026-06-04, when the platform
    infrastructure was decommissioned to zero. See ROADMAP.md in the repo root.

    Authentication: mixed model, validated in-handler on every /api/v1 route.
    Requests without a valid bearer JWT receive 401. Role behavior:

    - admin: full access to every route.
    - client: read access (list/get projects, milestones, deliverables,
      messages, links, emails) scoped to projects whose client_user_id equals
      the JWT sub claim, plus the ability to post messages on those projects.
      A client probing a project (or milestone under a project) that is not
      assigned to them receives 404 with the same body as a missing row, not
      403. This is by design: cross-client probes are indistinguishable from
      nonexistent resources, so project existence is never disclosed.
    - any other role: 403 {"code": "FORBIDDEN", "message": "admin or client
      role required"} on the read routes and on message creation.

    Every mutation except message creation (create/update/delete of projects,
    milestones, deliverables, links, and the email sync) is admin-only and
    returns 403 {"code": "FORBIDDEN", "message": "admin role required"} for
    any non-admin caller, including clients. /health and /ready are
    unauthenticated.

    Error envelope: service-generated errors use the ApiError shape
    {"code", "message", "details?"}. Framework-generated rejections (malformed
    JSON, JSON body that fails deserialization) are produced by axum before
    the handler runs and have text/plain bodies; they are documented per
    operation below.

    Rate limiting: enforced at the platform gateway (go-gateway, shipped in
    v1.10), not in this service. The gateway sets X-RateLimit-Limit,
    X-RateLimit-Remaining, and X-RateLimit-Reset on every proxied response and
    adds Retry-After on 429. Platform tiers: auth routes 5 rps, write routes
    30 rps, read routes 60 rps, per client IP per route. Requests sent directly
    to the service bypass the gateway and carry none of these headers.
  contact:
    name: InfraPortal platform
externalDocs:
  description: "Platform API getting-started guide"
  url: "https://github.com/rodmen07/microservices/blob/main/docs/API.md"
servers:
  - url: "https://projects-service-5gcrg4oiza-uc.a.run.app"
    description: "Historical Cloud Run deployment. Offline since 2026-06-04."
  - url: "http://localhost:3014"
    description: "Local development (default HOST 0.0.0.0, default PORT 3014)."
tags:
  - name: Health
    description: "Liveness and readiness probes. Unauthenticated."
  - name: Projects
    description: "Project CRUD. Reads allow admin or scoped client; mutations are admin-only."
  - name: Milestones
    description: "Milestones under a project. Reads allow admin or scoped client; mutations are admin-only."
  - name: Deliverables
    description: "Deliverables under a milestone. Reads allow admin or scoped client; mutations are admin-only."
  - name: Messages
    description: "Portal message thread per project. Admins and scoped clients can read and post."
  - name: Links
    description: "External links attached to a project. Reads allow admin or scoped client; mutations are admin-only."
  - name: Emails
    description: "Email threads synced onto a project. Reads allow admin or scoped client; sync is admin-only."
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: |
        Returns service health. The handler runs a database ping (SELECT 1),
        so a failing database returns 503 with status "degraded" and an error
        string. No authentication required.
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is up and the database ping succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
        "503":
          description: Database ping failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: degraded
                error: "pool timed out while waiting for an open connection"
  /ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: |
        Wired to the same handler as /health, so readiness and liveness are
        currently identical: both run the database ping. No authentication
        required.
      operationId: readinessCheck
      security: []
      responses:
        "200":
          description: Service is ready and the database ping succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
        "503":
          description: Database ping failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: degraded
                error: "pool timed out while waiting for an open connection"
  /api/v1/projects:
    get:
      tags:
        - Projects
      summary: List projects
      description: |
        Returns projects ordered by created_at descending. Admin callers see
        every project; client callers see only projects whose client_user_id
        equals their JWT sub claim; any other role receives 403. There is no
        pagination, filtering, or query string: the full visible set is
        returned as a bare JSON array. Read tier: 60 rps at the gateway.
      operationId: listProjects
      responses:
        "200":
          description: "Array of visible projects (all for admin, own for client)."
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
              example:
                - id: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
                  account_id: "3f9a1c2e-8b4d-4e6f-9a2b-1c5d7e9f0a3b"
                  client_user_id: "7d4e2f10-9c8b-4a5d-b6e3-2f1a0c9d8e7b"
                  name: "Portal Redesign"
                  description: "Client portal dashboard rebuild"
                  status: active
                  start_date: "2026-05-01"
                  target_end_date: "2026-08-31"
                  created_at: "2026-05-01T10:00:00Z"
                  updated_at: "2026-05-17T09:30:00Z"
                - id: "4a8e6c2d-9b1f-4e5a-8c3d-7f2b0a6e4d9c"
                  account_id: "3f9a1c2e-8b4d-4e6f-9a2b-1c5d7e9f0a3b"
                  client_user_id: null
                  name: "Data Migration"
                  description: null
                  status: planning
                  start_date: null
                  target_end_date: null
                  created_at: "2026-04-20T08:00:00Z"
                  updated_at: "2026-04-20T08:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenAdminOrClient"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Projects
      summary: Create a project
      description: |
        Creates a project. Admin-only. name and account_id are trimmed and
        must be non-empty and at most 255 characters; description is limited
        to 1000 characters; status defaults to "active" when omitted, blank,
        or whitespace-only. start_date and target_end_date are free-form TEXT
        and are stored as sent (no date validation). On success the service
        emits a project.created platform event and indexes the project in
        search-service (both fire-and-forget). Write tier: 30 rps at the
        gateway.
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
            example:
              account_id: "3f9a1c2e-8b4d-4e6f-9a2b-1c5d7e9f0a3b"
              client_user_id: "7d4e2f10-9c8b-4a5d-b6e3-2f1a0c9d8e7b"
              name: "Portal Redesign"
              description: "Client portal dashboard rebuild"
              status: active
              start_date: "2026-05-01"
              target_end_date: "2026-08-31"
      responses:
        "201":
          description: Project created.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
              example:
                id: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
                account_id: "3f9a1c2e-8b4d-4e6f-9a2b-1c5d7e9f0a3b"
                client_user_id: "7d4e2f10-9c8b-4a5d-b6e3-2f1a0c9d8e7b"
                name: "Portal Redesign"
                description: "Client portal dashboard rebuild"
                status: active
                start_date: "2026-05-01"
                target_end_date: "2026-08-31"
                created_at: "2026-07-18T14:30:00Z"
                updated_at: "2026-07-18T14:30:00Z"
        "400":
          description: |
            Validation failure (ApiError envelope, checked in order: name,
            account_id, description, status) or malformed JSON syntax
            (text/plain, generated by the axum Json extractor before the
            handler runs).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                emptyName:
                  summary: Name empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "name must not be empty"
                    details:
                      field: name
                      constraint: "must not be empty"
                nameTooLong:
                  summary: Name longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "name exceeds maximum length"
                    details:
                      field: name
                      constraint: "max 255 characters"
                emptyAccountId:
                  summary: account_id empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "account_id must not be empty"
                    details:
                      field: account_id
                      constraint: "must not be empty"
                accountIdTooLong:
                  summary: account_id longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "account_id exceeds maximum length"
                    details:
                      field: account_id
                      constraint: "max 255 characters"
                descriptionTooLong:
                  summary: Description longer than 1000 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "description exceeds maximum length"
                    details:
                      field: description
                      constraint: "max 1000 characters"
                invalidStatus:
                  summary: Status not in the accepted set
                  value:
                    code: VALIDATION_ERROR
                    message: "status must be one of: planning, active, on_hold, completed, cancelled"
                    details:
                      field: status
                      valid_values:
                        - planning
                        - active
                        - on_hold
                        - completed
                        - cancelled
            text/plain:
              schema:
                type: string
              example: "Failed to parse the request body as JSON: expected value at line 1 column 1"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenAdmin"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/projects/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: "Project ID (UUID v4, stored as TEXT)."
        schema:
          type: string
          format: uuid
        example: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
    get:
      tags:
        - Projects
      summary: Get a project
      description: |
        Fetches a single project by ID. Admin callers can fetch any project.
        Client callers can fetch only projects whose client_user_id equals
        their JWT sub; probing any other project returns 404 with the same
        body as a missing row (never 403, by design). Any other role receives
        403. Read tier: 60 rps at the gateway.
      operationId: getProject
      responses:
        "200":
          description: The requested project.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
              example:
                id: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
                account_id: "3f9a1c2e-8b4d-4e6f-9a2b-1c5d7e9f0a3b"
                client_user_id: "7d4e2f10-9c8b-4a5d-b6e3-2f1a0c9d8e7b"
                name: "Portal Redesign"
                description: "Client portal dashboard rebuild"
                status: active
                start_date: "2026-05-01"
                target_end_date: "2026-08-31"
                created_at: "2026-05-01T10:00:00Z"
                updated_at: "2026-05-17T09:30:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenAdminOrClient"
        "404":
          $ref: "#/components/responses/NotFoundProject"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - Projects
      summary: Update a project
      description: |
        Partial update. Admin-only. Omitted fields keep their stored values;
        because every field deserializes as an optional value, sending an
        explicit null is treated the same as omitting the field, so
        client_user_id, description, start_date, and target_end_date can never
        be cleared back to null through this endpoint. start_date and
        target_end_date are trimmed when provided. The existing row is loaded
        before body validation, so an unknown ID returns 404 even when the
        body is also invalid. On success updated_at is refreshed, a
        project.updated platform event is emitted, and the project is
        re-indexed in search-service (both fire-and-forget). Write tier:
        30 rps at the gateway.
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
            example:
              status: on_hold
      responses:
        "200":
          description: The updated project.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
              example:
                id: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
                account_id: "3f9a1c2e-8b4d-4e6f-9a2b-1c5d7e9f0a3b"
                client_user_id: "7d4e2f10-9c8b-4a5d-b6e3-2f1a0c9d8e7b"
                name: "Portal Redesign"
                description: "Client portal dashboard rebuild"
                status: on_hold
                start_date: "2026-05-01"
                target_end_date: "2026-08-31"
                created_at: "2026-05-01T10:00:00Z"
                updated_at: "2026-07-18T16:45:00Z"
        "400":
          description: |
            Validation failure (ApiError envelope, checked in order: name,
            status, description) or malformed JSON syntax (text/plain,
            generated by the axum Json extractor before the handler runs).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                emptyName:
                  summary: Name provided but empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "name must not be empty"
                    details:
                      field: name
                      constraint: "must not be empty"
                nameTooLong:
                  summary: Name longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "name exceeds maximum length"
                    details:
                      field: name
                      constraint: "max 255 characters"
                invalidStatus:
                  summary: Status not in the accepted set
                  value:
                    code: VALIDATION_ERROR
                    message: "status must be one of: planning, active, on_hold, completed, cancelled"
                    details:
                      field: status
                      valid_values:
                        - planning
                        - active
                        - on_hold
                        - completed
                        - cancelled
                descriptionTooLong:
                  summary: Description longer than 1000 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "description exceeds maximum length"
                    details:
                      field: description
                      constraint: "max 1000 characters"
            text/plain:
              schema:
                type: string
              example: "Failed to parse the request body as JSON: expected value at line 1 column 1"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenAdmin"
        "404":
          $ref: "#/components/responses/NotFoundProject"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Projects
      summary: Delete a project
      description: |
        Deletes a project by ID. Admin-only. Returns 204 with no body on
        success, 404 when no row was deleted. On success the project is
        removed from the search index (fire-and-forget). Note: the milestones
        and messages tables reference projects without ON DELETE CASCADE
        (only project_links and project_emails cascade), so deleting a project
        that still has milestones or messages fails the foreign key constraint
        and surfaces as 500 DB_ERROR. Write tier: 30 rps at the gateway.
      operationId: deleteProject
      responses:
        "204":
          description: Project deleted. No response body.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenAdmin"
        "404":
          $ref: "#/components/responses/NotFoundProject"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/projects/{project_id}/milestones:
    parameters:
      - name: project_id
        in: path
        required: true
        description: "Parent project ID (UUID v4, stored as TEXT)."
        schema:
          type: string
          format: uuid
        example: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
    get:
      tags:
        - Milestones
      summary: List milestones for a project
      description: |
        Returns the project's milestones ordered by sort_order ascending, then
        created_at ascending, as a bare JSON array (no pagination). Admin
        callers can list any project's milestones; client callers only their
        own project's (a foreign project returns 404, not 403, by design);
        other roles receive 403. Read tier: 60 rps at the gateway.
      operationId: listMilestones
      responses:
        "200":
          description: Array of milestones for the project.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
              example:
                - id: "5e2d8c4b-1a9f-4d3e-8b7c-6f0a2e4d9c1b"
                  project_id: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
                  name: "Discovery"
                  description: "Requirements and design sign-off"
                  due_date: "2026-05-15"
                  status: completed
                  sort_order: 0
                  created_at: "2026-05-01T10:05:00Z"
                  updated_at: "2026-05-15T17:00:00Z"
                - id: "8b6a4d2c-3e9f-4c1b-a7d5-0f2e6c8a4b1d"
                  project_id: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
                  name: "Build"
                  description: null
                  due_date: "2026-07-31"
                  status: in_progress
                  sort_order: 1
                  created_at: "2026-05-01T10:06:00Z"
                  updated_at: "2026-06-02T12:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenAdminOrClient"
        "404":
          $ref: "#/components/responses/NotFoundProject"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Milestones
      summary: Create a milestone
      description: |
        Creates a milestone under the project. Admin-only. The parent project
        existence check runs before body validation, so an unknown project_id
        returns 404 even when the body is also invalid. name is trimmed,
        non-empty, at most 255 characters; description is limited to 1000
        characters; status defaults to "pending" when omitted, blank, or
        whitespace-only; sort_order defaults to 0 and is cast to a 32-bit
        integer server-side. due_date is free-form TEXT and stored as sent.
        Write tier: 30 rps at the gateway.
      operationId: createMilestone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMilestoneRequest"
            example:
              name: "Build"
              description: "Implementation phase"
              due_date: "2026-07-31"
              status: pending
              sort_order: 1
      responses:
        "201":
          description: Milestone created.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
              example:
                id: "8b6a4d2c-3e9f-4c1b-a7d5-0f2e6c8a4b1d"
                project_id: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
                name: "Build"
                description: "Implementation phase"
                due_date: "2026-07-31"
                status: pending
                sort_order: 1
                created_at: "2026-07-18T14:30:00Z"
                updated_at: "2026-07-18T14:30:00Z"
        "400":
          description: |
            Validation failure (ApiError envelope, checked in order: name,
            description, status) or malformed JSON syntax (text/plain,
            generated by the axum Json extractor before the handler runs).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                emptyName:
                  summary: Name empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "name must not be empty"
                    details:
                      field: name
                      constraint: "must not be empty"
                nameTooLong:
                  summary: Name longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "name exceeds maximum length"
                    details:
                      field: name
                      constraint: "max 255 characters"
                descriptionTooLong:
                  summary: Description longer than 1000 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "description exceeds maximum length"
                    details:
                      field: description
                      constraint: "max 1000 characters"
                invalidStatus:
                  summary: Status not in the accepted set
                  value:
                    code: VALIDATION_ERROR
                    message: "status must be one of: pending, in_progress, completed"
                    details:
                      field: status
                      valid_values:
                        - pending
                        - in_progress
                        - completed
            text/plain:
              schema:
                type: string
              example: "Failed to parse the request body as JSON: expected value at line 1 column 1"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
