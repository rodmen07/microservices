        "403":
          $ref: "#/components/responses/ForbiddenAdmin"
        "404":
          $ref: "#/components/responses/NotFoundMilestone"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Milestones
      summary: Delete a milestone
      description: |
        Deletes a milestone by ID. Admin-only. Returns 204 with no body on
        success, 404 when no row was deleted. Note: the deliverables table
        references milestones without ON DELETE CASCADE, so deleting a
        milestone that still has deliverables fails the foreign key constraint
