  /api/v1/milestones/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: "Milestone ID (UUID v4, stored as TEXT)."
        schema:
          type: string
          format: uuid
        example: "8b6a4d2c-3e9f-4c1b-a7d5-0f2e6c8a4b1d"
    patch:
      tags:
        - Milestones
      summary: Update a milestone
      description: |
        Partial update. Admin-only. Omitted fields keep their stored values;
        sending an explicit null is treated the same as omitting the field, so
        description and due_date can never be cleared back to null through
        this endpoint. due_date is trimmed when provided; sort_order is cast
        to a 32-bit integer. The existing row is loaded before body
        validation, so an unknown ID returns 404 even when the body is also
        invalid. updated_at is refreshed on success. Write tier: 30 rps at
        the gateway.
      operationId: updateMilestone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMilestoneRequest"
            example:
              status: in_progress
      responses:
        "200":
          description: The updated milestone.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
              example:
                id: "8b6a4d2c-3e9f-4c1b-a7d5-0f2e6c8a4b1d"
                project_id: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
                name: "Build"
                description: "Implementation phase"
                due_date: "2026-07-31"
                status: in_progress
                sort_order: 1
                created_at: "2026-05-01T10:06:00Z"
                updated_at: "2026-07-18T16:45:00Z"
        "400":
          description: |
            Validation failure (ApiError envelope, checked in order: name,
            status, description) or malformed JSON syntax (text/plain,
            generated by the axum Json extractor before the handler runs).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                emptyName:
                  summary: Name provided but empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "name must not be empty"
                    details:
                      field: name
                      constraint: "must not be empty"
                nameTooLong:
                  summary: Name longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "name exceeds maximum length"
                    details:
                      field: name
                      constraint: "max 255 characters"
                invalidStatus:
                  summary: Status not in the accepted set
                  value:
                    code: VALIDATION_ERROR
                    message: "status must be one of: pending, in_progress, completed"
                    details:
                      field: status
                      valid_values:
                        - pending
                        - in_progress
                        - completed
                descriptionTooLong:
                  summary: Description longer than 1000 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "description exceeds maximum length"
                    details:
                      field: description
                      constraint: "max 1000 characters"
            text/plain:
              schema:
                type: string
              example: "Failed to parse the request body as JSON: expected value at line 1 column 1"
        "401":
