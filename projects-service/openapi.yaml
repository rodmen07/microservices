                  created_at: "2026-05-06T09:30:00Z"
                  updated_at: "2026-05-06T09:30:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenAdminOrClient"
        "404":
          $ref: "#/components/responses/NotFoundProject"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Links
      summary: Create a link
      description: |
        Attaches an external link to the project. Admin-only. The parent
        project existence check runs before body validation, so an unknown
        project_id returns 404 even when the body is also invalid. link_type,
        label, and url are trimmed and must be non-empty; link_type and label
        are limited to 255 characters, url to 2048. sort_order defaults to 0.
        Validation order: link_type, label, url. Write tier: 30 rps at the
        gateway.
      operationId: createLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectLinkRequest"
            example:
              link_type: github
              label: "Frontend repo"
              url: "https://github.com/rodmen07/infraportal"
              sort_order: 0
      responses:
        "201":
          description: Link created.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectLink"
              example:
                id: "0f9e8d7c-6b5a-4433-8221-1a2b3c4d5e6f"
                project_id: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
                link_type: github
                label: "Frontend repo"
                url: "https://github.com/rodmen07/infraportal"
                sort_order: 0
                created_at: "2026-07-18T14:30:00Z"
                updated_at: "2026-07-18T14:30:00Z"
        "400":
          description: |
            Validation failure (ApiError envelope, checked in order:
            link_type, label, url) or malformed JSON syntax (text/plain,
            generated by the axum Json extractor before the handler runs).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                emptyLinkType:
                  summary: link_type empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "link_type must not be empty"
                    details:
                      field: link_type
                      constraint: "must not be empty"
                linkTypeTooLong:
                  summary: link_type longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "link_type exceeds maximum length"
                    details:
                      field: link_type
                      constraint: "max 255 characters"
                emptyLabel:
                  summary: Label empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "label must not be empty"
                    details:
                      field: label
                      constraint: "must not be empty"
                labelTooLong:
                  summary: Label longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "label exceeds maximum length"
                    details:
                      field: label
                      constraint: "max 255 characters"
                emptyUrl:
                  summary: URL empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "url must not be empty"
                    details:
                      field: url
                      constraint: "must not be empty"
                urlTooLong:
                  summary: URL longer than 2048 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "url exceeds maximum length"
                    details:
                      field: url
                      constraint: "max 2048 characters"
            text/plain:
              schema:
                type: string
              example: "Failed to parse the request body as JSON: expected value at line 1 column 1"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenAdmin"
        "404":
          $ref: "#/components/responses/NotFoundProject"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/links/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: "Link ID (UUID v4, stored as TEXT)."
        schema:
          type: string
          format: uuid
        example: "0f9e8d7c-6b5a-4433-8221-1a2b3c4d5e6f"
    delete:
      tags:
        - Links
      summary: Delete a link
      description: |
        Deletes a link by ID. Admin-only. Returns 204 with no body on
        success, 404 when no row was deleted. Write tier: 30 rps at the
        gateway.
      operationId: deleteLink
      responses:
        "204":
          description: Link deleted. No response body.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenAdmin"
        "404":
          $ref: "#/components/responses/NotFoundLink"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/projects/{project_id}/emails:
    parameters:
      - name: project_id
        in: path
        required: true
        description: "Parent project ID (UUID v4, stored as TEXT)."
        schema:
          type: string
          format: uuid
        example: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
    get:
      tags:
        - Emails
      summary: List synced emails for a project
      description: |
        Returns the project's synced email threads ordered by received_at
        descending (lexicographic on the stored TEXT value), as a bare JSON
        array (no pagination). Admin callers can list any project's emails;
        client callers only their own project's (a foreign project returns
        404, not 403, by design); other roles receive 403. Read tier: 60 rps
        at the gateway.
      operationId: listEmails
      responses:
        "200":
          description: Array of synced emails for the project, newest first.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectEmail"
              example:
                - id: "2b4d6f8a-0c1e-4357-9b8d-7e6f5a4c3b2d"
                  project_id: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
                  thread_id: "thread-18c2a4e6f9"
                  subject: "Re: Portal Redesign kickoff"
                  from_email: "client@globex.com"
                  snippet: "Sounds good, let's start Monday."
                  body_html: "<p>Sounds good, let's start Monday.</p>"
                  received_at: "2026-06-02T08:15:00Z"
                  created_at: "2026-06-02T09:00:00Z"
                  updated_at: "2026-06-02T09:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenAdminOrClient"
        "404":
          $ref: "#/components/responses/NotFoundProject"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/projects/{project_id}/emails/sync:
    parameters:
      - name: project_id
        in: path
        required: true
        description: "Parent project ID (UUID v4, stored as TEXT)."
        schema:
          type: string
          format: uuid
        example: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
    post:
      tags:
        - Emails
      summary: Sync email threads onto a project
      description: |
        Upserts a batch of email threads onto the project, keyed on
        (project_id, thread_id): existing threads have subject, from_email,
        snippet, body_html, received_at, and updated_at replaced; new threads
        are inserted. Admin-only. The project existence check runs before any
        email validation, so an unknown project_id returns 404 even when the
        body is also invalid. Emails are validated and upserted one at a time
        in request order with no transaction: when validation fails partway
        through the list, the emails before the failing one are already
        upserted and the 400 response does not roll them back. An empty
        emails array succeeds with {"upserted": 0}. received_at is stored as
        sent (no date validation). Write tier: 30 rps at the gateway.
      operationId: syncEmails
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncEmailsRequest"
            example:
              emails:
                - thread_id: "thread-18c2a4e6f9"
                  subject: "Re: Portal Redesign kickoff"
                  from_email: "client@globex.com"
                  snippet: "Sounds good, let's start Monday."
                  body_html: "<p>Sounds good, let's start Monday.</p>"
                  received_at: "2026-06-02T08:15:00Z"
      responses:
        "200":
          description: Batch processed. Returns the number of emails upserted.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncEmailsResponse"
              example:
                upserted: 1
        "400":
          description: |
            Per-email validation failure (ApiError envelope, checked per email
            in order: thread_id, subject, from_email, snippet, body_html) or
            malformed JSON syntax (text/plain, generated by the axum Json
            extractor before the handler runs). Emails earlier in the list
            than the failing one have already been upserted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                emptyThreadId:
                  summary: thread_id empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "email thread_id must not be empty"
                    details:
                      field: thread_id
                      constraint: "must not be empty"
                threadIdTooLong:
                  summary: thread_id longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "email thread_id exceeds maximum length"
                    details:
                      field: thread_id
                      constraint: "max 255 characters"
                emptySubject:
                  summary: Subject empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "email subject must not be empty"
                    details:
                      field: subject
                      constraint: "must not be empty"
                subjectTooLong:
                  summary: Subject longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "email subject exceeds maximum length"
                    details:
                      field: subject
                      constraint: "max 255 characters"
                emptyFromEmail:
                  summary: from_email empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "email from_email must not be empty"
                    details:
                      field: from_email
                      constraint: "must not be empty"
                fromEmailTooLong:
                  summary: from_email longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "email from_email exceeds maximum length"
                    details:
                      field: from_email
                      constraint: "max 255 characters"
                snippetTooLong:
                  summary: Snippet longer than 1000 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "email snippet exceeds maximum length"
                    details:
                      field: snippet
                      constraint: "max 1000 characters"
                bodyHtmlTooLong:
                  summary: body_html longer than 10000 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "email body_html exceeds maximum length"
                    details:
                      field: body_html
                      constraint: "max 10000 characters"
            text/plain:
              schema:
                type: string
              example: "Failed to parse the request body as JSON: expected value at line 1 column 1"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/ForbiddenAdmin"
        "404":
          $ref: "#/components/responses/NotFoundProject"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer JWT issued by auth-service. Validated in-handler with HS256 by
        default (AUTH_JWT_ALGORITHM also accepts HS384, HS512, RS256, RS384,
        RS512; the RS variants read a PEM public key from
        AUTH_JWT_PUBLIC_KEY). The token must carry an exp claim and an iss
        claim matching AUTH_ISSUER (default "auth-service"). The sub claim
        identifies the caller and scopes client-role access; the roles claim
        (array of strings, case-insensitive) is checked for "admin" and
        "client" as documented per operation.
  schemas:
    Project:
      type: object
      description: "A client portal project. IDs and timestamps are stored as TEXT."
      required:
        - id
        - account_id
        - client_user_id
        - name
        - description
        - status
        - start_date
        - target_end_date
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: "Project ID, a UUID v4 generated at creation."
          example: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
        account_id:
          type: string
          description: "ID of the CRM account this project belongs to. Trimmed, non-empty, at most 255 characters. Not validated against accounts-service."
          example: "3f9a1c2e-8b4d-4e6f-9a2b-1c5d7e9f0a3b"
        client_user_id:
          type: string
          nullable: true
          description: "JWT sub of the client-role user granted portal access to this project. Null when no client is assigned; serialized as null, never omitted."
          example: "7d4e2f10-9c8b-4a5d-b6e3-2f1a0c9d8e7b"
        name:
          type: string
          maxLength: 255
          description: "Project display name. Trimmed, non-empty, at most 255 characters."
          example: "Portal Redesign"
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: "Free-text description, at most 1000 characters. Null when not set."
          example: "Client portal dashboard rebuild"
        status:
          type: string
          enum:
            - planning
            - active
            - on_hold
            - completed
            - cancelled
          description: "Project lifecycle status."
          example: active
        start_date:
          type: string
          nullable: true
          description: "Planned start date. Free-form TEXT; the service stores it as sent (trimmed on update) and performs no date validation."
          example: "2026-05-01"
        target_end_date:
          type: string
          nullable: true
          description: "Planned end date. Free-form TEXT; the service stores it as sent (trimmed on update) and performs no date validation."
          example: "2026-08-31"
        created_at:
          type: string
          format: date-time
          description: "Creation timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision)."
          example: "2026-05-01T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: "Last update timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision)."
          example: "2026-05-17T09:30:00Z"
    CreateProjectRequest:
      type: object
      required:
        - account_id
        - name
      properties:
        account_id:
          type: string
          minLength: 1
          maxLength: 255
          description: "Owning CRM account ID. Trimmed server-side; must be non-empty after trimming."
          example: "3f9a1c2e-8b4d-4e6f-9a2b-1c5d7e9f0a3b"
        client_user_id:
          type: string
          nullable: true
          description: "JWT sub of the client user to grant portal access. Stored as sent."
          example: "7d4e2f10-9c8b-4a5d-b6e3-2f1a0c9d8e7b"
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: "Project display name. Trimmed server-side; must be non-empty after trimming."
          example: "Portal Redesign"
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: "Free-text description, at most 1000 characters."
          example: "Client portal dashboard rebuild"
        status:
          type: string
          enum:
            - planning
            - active
            - on_hold
            - completed
            - cancelled
          default: active
          description: "Initial status. Defaults to active when omitted, blank, or whitespace-only."
        start_date:
          type: string
          nullable: true
          description: "Planned start date. Stored as sent; no date validation."
          example: "2026-05-01"
        target_end_date:
          type: string
          nullable: true
          description: "Planned end date. Stored as sent; no date validation."
          example: "2026-08-31"
    UpdateProjectRequest:
      type: object
      description: |
        Partial update. Every field is optional; omitted fields keep their
        stored values. An explicit null is treated the same as omitting the
        field, so no field can be cleared to null through this endpoint.
      properties:
        client_user_id:
          type: string
          description: "New client user ID. Cannot be cleared to null."
          example: "7d4e2f10-9c8b-4a5d-b6e3-2f1a0c9d8e7b"
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: "New display name. An empty or whitespace-only value is rejected with 400."
          example: "Portal Redesign"
        description:
          type: string
          maxLength: 1000
          description: "New description, at most 1000 characters. Cannot be cleared to null."
          example: "Client portal dashboard rebuild"
        status:
          type: string
          enum:
            - planning
            - active
            - on_hold
            - completed
            - cancelled
          description: "New status."
          example: on_hold
        start_date:
          type: string
          description: "New start date. Trimmed; stored as sent; no date validation. Cannot be cleared to null."
          example: "2026-05-01"
        target_end_date:
          type: string
          description: "New end date. Trimmed; stored as sent; no date validation. Cannot be cleared to null."
          example: "2026-08-31"
    Milestone:
      type: object
      description: "A milestone under a project. IDs and timestamps are stored as TEXT."
      required:
        - id
        - project_id
        - name
        - description
        - due_date
        - status
        - sort_order
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: "Milestone ID, a UUID v4 generated at creation."
          example: "8b6a4d2c-3e9f-4c1b-a7d5-0f2e6c8a4b1d"
        project_id:
          type: string
          format: uuid
          description: "Parent project ID."
          example: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
        name:
          type: string
          maxLength: 255
          description: "Milestone display name. Trimmed, non-empty, at most 255 characters."
          example: "Build"
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: "Free-text description, at most 1000 characters. Null when not set."
          example: "Implementation phase"
        due_date:
          type: string
          nullable: true
          description: "Due date. Free-form TEXT; stored as sent (trimmed on update); no date validation."
          example: "2026-07-31"
        status:
          type: string
          enum:
            - pending
            - in_progress
            - completed
          description: "Milestone status."
          example: in_progress
        sort_order:
          type: integer
          format: int32
          description: "Manual ordering key. Lower values sort first."
          example: 1
        created_at:
          type: string
          format: date-time
          description: "Creation timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision)."
          example: "2026-05-01T10:06:00Z"
        updated_at:
          type: string
          format: date-time
          description: "Last update timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision)."
          example: "2026-06-02T12:00:00Z"
    CreateMilestoneRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: "Milestone display name. Trimmed server-side; must be non-empty after trimming."
          example: "Build"
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: "Free-text description, at most 1000 characters."
          example: "Implementation phase"
        due_date:
          type: string
          nullable: true
          description: "Due date. Stored as sent; no date validation."
          example: "2026-07-31"
        status:
          type: string
          enum:
            - pending
            - in_progress
            - completed
          default: pending
          description: "Initial status. Defaults to pending when omitted, blank, or whitespace-only."
        sort_order:
          type: integer
          default: 0
          description: "Manual ordering key. Accepted as a 64-bit integer and cast to 32 bits server-side."
          example: 1
    UpdateMilestoneRequest:
      type: object
      description: |
        Partial update. Every field is optional; omitted fields keep their
        stored values. An explicit null is treated the same as omitting the
        field, so no field can be cleared to null through this endpoint.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: "New display name. An empty or whitespace-only value is rejected with 400."
          example: "Build"
        description:
          type: string
          maxLength: 1000
          description: "New description, at most 1000 characters. Cannot be cleared to null."
          example: "Implementation phase"
        due_date:
          type: string
          description: "New due date. Trimmed; stored as sent; no date validation. Cannot be cleared to null."
          example: "2026-07-31"
        status:
          type: string
          enum:
            - pending
            - in_progress
            - completed
          description: "New status."
          example: in_progress
        sort_order:
          type: integer
          description: "New ordering key. Accepted as a 64-bit integer and cast to 32 bits server-side."
          example: 2
    Deliverable:
      type: object
      description: "A deliverable under a milestone. IDs and timestamps are stored as TEXT."
      required:
        - id
        - milestone_id
        - name
        - description
        - status
        - estimated_hours
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: "Deliverable ID, a UUID v4 generated at creation."
          example: "a1b2c3d4-5e6f-4a7b-8c9d-0e1f2a3b4c5d"
        milestone_id:
          type: string
          format: uuid
          description: "Parent milestone ID."
          example: "8b6a4d2c-3e9f-4c1b-a7d5-0f2e6c8a4b1d"
        name:
          type: string
          maxLength: 255
          description: "Deliverable display name. Trimmed, non-empty, at most 255 characters."
          example: "Dashboard wireframes"
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: "Free-text description, at most 1000 characters. Null when not set."
          example: "Figma wireframes for the portal dashboard"
        status:
          type: string
          enum:
            - not_started
            - in_progress
            - in_review
            - accepted
          description: "Deliverable status."
          example: in_progress
        estimated_hours:
          type: number
          format: double
          nullable: true
          description: "Estimated effort in hours. Null when not set."
          example: 12.5
        created_at:
          type: string
          format: date-time
          description: "Creation timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision)."
          example: "2026-05-02T09:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: "Last update timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision)."
          example: "2026-05-14T15:20:00Z"
    CreateDeliverableRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: "Deliverable display name. Trimmed server-side; must be non-empty after trimming."
          example: "Dashboard wireframes"
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: "Free-text description, at most 1000 characters."
          example: "Figma wireframes for the portal dashboard"
        status:
          type: string
          enum:
            - not_started
            - in_progress
            - in_review
            - accepted
          default: not_started
          description: "Initial status. Defaults to not_started when omitted, blank, or whitespace-only."
        estimated_hours:
          type: number
          format: double
          nullable: true
          description: "Estimated effort in hours."
          example: 12.5
    UpdateDeliverableRequest:
      type: object
      description: |
        Partial update. Every field is optional; omitted fields keep their
        stored values. An explicit null is treated the same as omitting the
        field, so no field can be cleared to null through this endpoint.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: "New display name. An empty or whitespace-only value is rejected with 400."
          example: "Dashboard wireframes"
        description:
          type: string
          maxLength: 1000
          description: "New description, at most 1000 characters. Cannot be cleared to null."
          example: "Figma wireframes for the portal dashboard"
        status:
          type: string
          enum:
            - not_started
            - in_progress
            - in_review
            - accepted
          description: "New status."
          example: in_review
        estimated_hours:
          type: number
          format: double
          description: "New estimate in hours. Cannot be cleared to null."
          example: 16
    Message:
      type: object
      description: "A portal message on a project thread. Messages are immutable: there is no update or delete route and no updated_at column."
      required:
        - id
        - project_id
        - author_id
        - author_role
        - body
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: "Message ID, a UUID v4 generated at creation."
          example: "d4c3b2a1-6f5e-4b7a-9d8c-1f0e2d3c4b5a"
        project_id:
          type: string
          format: uuid
          description: "Parent project ID."
          example: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
        author_id:
          type: string
          description: "JWT sub claim of the author."
          example: "7d4e2f10-9c8b-4a5d-b6e3-2f1a0c9d8e7b"
        author_role:
          type: string
          enum:
            - admin
            - client
          description: "Derived server-side at creation: admin when the author held the admin role, client otherwise."
          example: client
        body:
          type: string
          maxLength: 1000
          description: "Message text. Trimmed, non-empty, at most 1000 characters."
          example: "Looks great, approved."
        created_at:
          type: string
          format: date-time
          description: "Creation timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision)."
          example: "2026-06-01T15:30:00Z"
    CreateMessageRequest:
      type: object
      required:
        - body
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 1000
          description: "Message text. Trimmed server-side; must be non-empty after trimming and at most 1000 characters."
          example: "Looks great, approved."
    ProjectLink:
      type: object
      description: "An external link attached to a project (repo, drive folder, contract, etc.). IDs and timestamps are stored as TEXT."
      required:
        - id
        - project_id
        - link_type
        - label
        - url
        - sort_order
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: "Link ID, a UUID v4 generated at creation."
          example: "0f9e8d7c-6b5a-4433-8221-1a2b3c4d5e6f"
        project_id:
          type: string
          format: uuid
          description: "Parent project ID."
          example: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
        link_type:
          type: string
          maxLength: 255
          description: "Free-form link category, for example github, drive, upwork. Trimmed, non-empty, at most 255 characters; not validated against a fixed set."
          example: github
        label:
          type: string
          maxLength: 255
          description: "Display label. Trimmed, non-empty, at most 255 characters."
          example: "Frontend repo"
        url:
          type: string
          maxLength: 2048
          description: "Link target. Trimmed, non-empty, at most 2048 characters; not validated as a URL."
          example: "https://github.com/rodmen07/infraportal"
        sort_order:
          type: integer
          format: int32
          description: "Manual ordering key. Lower values sort first."
          example: 0
        created_at:
          type: string
          format: date-time
          description: "Creation timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision)."
          example: "2026-05-05T11:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: "Last update timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision). There is no update route, so this matches created_at in practice."
          example: "2026-05-05T11:00:00Z"
    CreateProjectLinkRequest:
      type: object
      required:
        - link_type
        - label
        - url
      properties:
        link_type:
          type: string
          minLength: 1
          maxLength: 255
          description: "Free-form link category. Trimmed server-side; must be non-empty after trimming."
          example: github
        label:
          type: string
          minLength: 1
          maxLength: 255
          description: "Display label. Trimmed server-side; must be non-empty after trimming."
          example: "Frontend repo"
        url:
          type: string
          minLength: 1
          maxLength: 2048
          description: "Link target. Trimmed server-side; must be non-empty after trimming; not validated as a URL."
          example: "https://github.com/rodmen07/infraportal"
        sort_order:
          type: integer
          default: 0
          description: "Manual ordering key. Defaults to 0 when omitted."
          example: 0
    ProjectEmail:
      type: object
      description: "An email thread synced onto a project, unique per (project_id, thread_id). IDs and timestamps are stored as TEXT."
      required:
        - id
        - project_id
        - thread_id
        - subject
        - from_email
        - snippet
        - body_html
        - received_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: "Row ID, a UUID v4 generated at first insert. Re-syncing an existing thread keeps the original ID."
          example: "2b4d6f8a-0c1e-4357-9b8d-7e6f5a4c3b2d"
        project_id:
          type: string
          format: uuid
          description: "Parent project ID."
          example: "9c1b7f3a-2d4e-4b8a-9f6c-0e5a3d7b1c2f"
        thread_id:
          type: string
          maxLength: 255
          description: "Upstream mail thread identifier. Unique per project."
          example: "thread-18c2a4e6f9"
        subject:
          type: string
          maxLength: 255
          description: "Thread subject line."
          example: "Re: Portal Redesign kickoff"
        from_email:
          type: string
          maxLength: 255
          description: "Sender address of the latest synced message."
          example: "client@globex.com"
        snippet:
          type: string
          nullable: true
          maxLength: 1000
          description: "Plain-text preview. Null when not provided."
          example: "Sounds good, let's start Monday."
        body_html:
          type: string
          nullable: true
          maxLength: 10000
          description: "HTML body. Null when not provided."
          example: "<p>Sounds good, let's start Monday.</p>"
        received_at:
          type: string
          description: "Caller-supplied receive time, stored verbatim as TEXT with no format validation. Listing sorts on this value lexicographically, so callers should send UTC %Y-%m-%dT%H:%M:%SZ for correct ordering."
          example: "2026-06-02T08:15:00Z"
        created_at:
          type: string
          format: date-time
          description: "First-sync timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision)."
          example: "2026-06-02T09:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: "Last-sync timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision)."
          example: "2026-06-02T09:00:00Z"
    UpsertEmailRequest:
      type: object
      required:
        - thread_id
        - subject
        - from_email
        - received_at
      properties:
        thread_id:
          type: string
          minLength: 1
          maxLength: 255
          description: "Upstream mail thread identifier. Validated after trimming but stored untrimmed."
          example: "thread-18c2a4e6f9"
        subject:
          type: string
          minLength: 1
          maxLength: 255
          description: "Thread subject line. Validated after trimming but stored untrimmed."
          example: "Re: Portal Redesign kickoff"
        from_email:
          type: string
          minLength: 1
          maxLength: 255
          description: "Sender address. Validated after trimming but stored untrimmed; not validated as an email address."
          example: "client@globex.com"
        snippet:
          type: string
          nullable: true
          maxLength: 1000
          description: "Plain-text preview, at most 1000 characters."
          example: "Sounds good, let's start Monday."
        body_html:
          type: string
          nullable: true
          maxLength: 10000
          description: "HTML body, at most 10000 characters."
          example: "<p>Sounds good, let's start Monday.</p>"
        received_at:
          type: string
          description: "Receive time. Stored verbatim; send UTC %Y-%m-%dT%H:%M:%SZ for correct list ordering."
          example: "2026-06-02T08:15:00Z"
    SyncEmailsRequest:
      type: object
      required:
        - emails
      properties:
        emails:
          type: array
          description: "Emails to upsert, processed in order. An empty array is accepted and upserts nothing."
          items:
            $ref: "#/components/schemas/UpsertEmailRequest"
    SyncEmailsResponse:
      type: object
      required:
        - upserted
      properties:
        upserted:
          type: integer
          description: "Number of emails upserted (inserted or updated) by this request."
          example: 1
    ApiError:
      type: object
      description: "Standard platform error envelope. details is omitted when absent, never null."
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: "Machine-readable error code."
          example: VALIDATION_ERROR
        message:
          type: string
          description: "Human-readable error message."
          example: "name must not be empty"
        details:
          description: "Optional structured context, for example the offending field and constraint."
          example:
            field: name
            constraint: "must not be empty"
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
          example: ok
        error:
          type: string
          description: "Database error string. Present only when status is degraded."
          example: "pool timed out while waiting for an open connection"
  headers:
    XRateLimitLimit:
      description: |
        Requests per second allowed for the matched route tier, per client IP.
        Platform tiers (enforced by go-gateway since v1.10): auth 5 rps,
        write 30 rps, read 60 rps. Absent when the service is called directly
        without the gateway.
      schema:
        type: integer
      example: 60
    XRateLimitRemaining:
      description: "Requests remaining in the current token bucket for this client and route tier."
      schema:
        type: integer
      example: 59
    XRateLimitReset:
      description: "Unix epoch second at which the bucket refills."
      schema:
        type: integer
        format: int64
      example: 1784822400
  responses:
    Unauthorized:
      description: "Missing, malformed, or invalid bearer token."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            missingHeader:
              summary: No Authorization header
              value:
                code: AUTH_REQUIRED
                message: "authorization header is required"
            invalidFormat:
              summary: Header is not exactly Bearer plus one token
              value:
                code: AUTH_INVALID_FORMAT
                message: "authorization header format must be 'Bearer <token>'"
            invalidToken:
              summary: Signature, expiry, or issuer validation failed
              value:
                code: AUTH_INVALID_TOKEN
                message: "token validation failed"
    ForbiddenAdmin:
      description: "Token is valid but the roles claim does not include admin. Client-role callers receive this on admin-only mutations."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: FORBIDDEN
            message: "admin role required"
    ForbiddenAdminOrClient:
      description: "Token is valid but the roles claim includes neither admin nor client. Client-role callers never receive this response on these routes; a client outside their scope gets 404 instead."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: FORBIDDEN
            message: "admin or client role required"
    NotFoundProject:
      description: "No project with the given ID exists. On routes accessible to the client role, the same response is returned when the project exists but is not assigned to the caller: cross-client probes return 404 rather than 403 by design, so project existence is never disclosed."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: NOT_FOUND
            message: "project not found"
    NotFoundMilestone:
      description: "No milestone with the given ID exists."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: NOT_FOUND
            message: "milestone not found"
    NotFoundDeliverable:
      description: "No deliverable with the given ID exists."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: NOT_FOUND
            message: "deliverable not found"
    NotFoundLink:
      description: "No link with the given ID exists."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: NOT_FOUND
            message: "link not found"
    UnprocessableEntity:
      description: |
        JSON body parsed but failed deserialization into the request type, for
        example a missing required field or a wrong type. Generated by the
        axum Json extractor before the handler runs; the body is text/plain,
        not the ApiError envelope.
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        text/plain:
          schema:
            type: string
          example: "Failed to deserialize the JSON body into the target type: missing field `name` at line 1 column 2"
    RateLimited:
      description: |
        Rate limit exceeded for the matched route tier. Returned by go-gateway,
        not by this service; direct calls to the service are never rate
        limited. The body follows the ApiError envelope without details.
      headers:
        Retry-After:
          description: "Seconds to wait before retrying."
          schema:
            type: integer
          example: 1
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: RATE_LIMITED
            message: "rate limit exceeded (30 req/s), retry after 1s"
    InternalError:
      description: "A database query failed."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: DB_ERROR
            message: "database error"
