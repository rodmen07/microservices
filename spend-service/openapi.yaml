openapi: 3.0.3
info:
  title: spend-service API
  version: 0.1.0
  description: |
    Cloud spend tracking service for the InfraPortal platform. Rust (axum 0.8)
    with PostgreSQL persistence. Provides CRUD operations on spend records,
    aggregated spend summaries, billing sync pulls from GCP, Fly.io, GitHub,
    and AWS, plus health and readiness probes.

    This spec documents the API contract as implemented in code
    (src/lib/router.rs, src/lib/handlers/, src/lib/models.rs, src/lib/auth.rs).
    All runtime endpoints have been offline since 2026-06-04, when the platform
    infrastructure was decommissioned to zero. See ROADMAP.md in the repo root.

    Authentication: every /api/v1 route validates a bearer JWT in the handler.
    Requests without a valid token receive 401. As implemented on main as of
    2026-07-18 there is NO role gating: any valid JWT can call every route,
    and the roles claim is parsed but never enforced. The only 403 responses
    in this service are the automated-record guards on PATCH and DELETE
    (records whose source is not "manual" cannot be edited or deleted).
    Note: admin role gating is planned and arrives with the
    refactor/adopt-axum-api-kit branch.

    Error envelope: service-generated errors use the ApiError shape
    {"code", "message", "details?"}. Framework-generated rejections (malformed
    JSON, JSON body that fails deserialization, invalid query string types) are
    produced by axum before the handler runs and have text/plain bodies; they
    are documented per operation below.

    Rate limiting: enforced at the platform gateway (go-gateway, shipped in
    v1.10), not in this service. The gateway sets X-RateLimit-Limit,
    X-RateLimit-Remaining, and X-RateLimit-Reset on every proxied response and
    adds Retry-After on 429. Platform tiers: auth routes 5 rps, write routes
    30 rps, read routes 60 rps, per client IP per route. Requests sent directly
    to the service bypass the gateway and carry none of these headers.
  contact:
    name: InfraPortal platform
externalDocs:
  description: "Platform API getting-started guide"
  url: "https://github.com/rodmen07/microservices/blob/main/docs/API.md"
servers:
  - url: "https://spend-service-5gcrg4oiza-uc.a.run.app"
    description: |
      Cloud Run deployment target following the platform URL pattern. The
      platform runtime has been offline since 2026-06-04; this service has
      not been deployed to it.
  - url: "http://localhost:3020"
    description: "Local development (default HOST 0.0.0.0, default PORT 3020)."
tags:
  - name: Health
    description: "Liveness and readiness probes. Unauthenticated."
  - name: Spend
    description: "Spend record CRUD and aggregated summary. Requires a bearer JWT (no role gating on main as of 2026-07-18)."
  - name: Sync
    description: "Billing sync pulls from external platforms. Requires a bearer JWT (no role gating on main as of 2026-07-18)."
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: |
        Returns service health. The handler runs a database ping (SELECT 1),
        so a failing database returns 503 with status "degraded" and an error
        string. No authentication required.
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is up and the database ping succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
        "503":
          description: Database ping failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: degraded
                error: "pool timed out while waiting for an open connection"
  /ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: |
        Wired to the same handler as /health, so readiness and liveness are
        currently identical: both run the database ping. No authentication
        required.
      operationId: readinessCheck
      security: []
      responses:
        "200":
          description: Service is ready and the database ping succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
        "503":
          description: Database ping failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: degraded
                error: "pool timed out while waiting for an open connection"
  /api/v1/spend:
    get:
      tags:
        - Spend
      summary: List spend records
      description: |
        Returns a paginated list of spend records ordered by date descending,
        then platform ascending, then service_label ascending. Supports exact
        filtering by platform and source and inclusive date range filtering
        via date_from and date_to. Filter values are not validated against the
        known platform or source sets; an unknown value simply matches zero
        rows. Date filters compare against the stored YYYY-MM-DD text.
        Read tier: 60 rps at the gateway.
      operationId: listSpend
      parameters:
        - name: limit
          in: query
          required: false
          description: |
            Maximum number of rows to return. Defaults to 50. Values are
            clamped to the range 1 to 200 rather than rejected.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          description: Number of rows to skip. Defaults to 0.
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: platform
          in: query
          required: false
          description: |
            Filter by exact platform value. Known values are gcp, flyio,
            anthropic, github_copilot, github, and aws, but the filter accepts
            any string.
          schema:
            type: string
          example: gcp
        - name: date_from
          in: query
          required: false
          description: "Inclusive lower bound on the record date (YYYY-MM-DD)."
          schema:
            type: string
            format: date
          example: "2026-07-01"
        - name: date_to
          in: query
          required: false
          description: "Inclusive upper bound on the record date (YYYY-MM-DD)."
          schema:
            type: string
            format: date
          example: "2026-07-31"
        - name: source
          in: query
          required: false
          description: |
            Filter by exact source value. Known values are manual, bigquery,
            flyio_graphql, github_api, and aws_cost_explorer, but the filter
            accepts any string.
          schema:
            type: string
          example: manual
      responses:
        "200":
          description: Paginated spend record list.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSpendResponse"
              example:
                data:
                  - id: "e7c1a9d4-3b2f-4c8e-9d1a-5f6b7c8d9e0f"
                    platform: gcp
                    date: "2026-07-15"
                    amount_usd: 4.37
                    granularity: daily
                    service_label: "Cloud Run"
                    source: bigquery
                    notes: null
                    created_at: "2026-07-16T02:00:00Z"
                    updated_at: "2026-07-16T02:00:00Z"
                  - id: "0f9e8d7c-6b5a-4d3c-8b1a-2c3d4e5f6a7b"
                    platform: anthropic
                    date: "2026-07-01"
                    amount_usd: 25.0
                    granularity: monthly
                    service_label: "Claude API"
                    source: manual
                    notes: "July API credits top-up"
                    created_at: "2026-07-02T18:45:00Z"
                    updated_at: "2026-07-02T18:45:00Z"
                total: 2
                limit: 50
                offset: 0
        "400":
          description: |
            Invalid query string, for example limit=abc or a negative offset.
            Generated by the axum Query extractor before the handler runs;
            the body is text/plain, not the ApiError envelope.
          content:
            text/plain:
              schema:
                type: string
              example: "Failed to deserialize query string: limit: invalid digit found in string"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Spend
      summary: Create a spend record
      description: |
        Creates a manual spend record. The platform is trimmed and lowercased
        and must be one of the known platforms. The date must be YYYY-MM-DD.
        amount_usd must be non-negative. granularity is trimmed and defaults
        to "daily" when omitted. service_label (max 255 characters) and notes
        (max 1000 characters) are trimmed; blank or whitespace-only values are
        stored as null. source is always "manual" for records created through
        this endpoint. The record ID is a generated UUID v4 and timestamps are
        set to the current UTC time. Write tier: 30 rps at the gateway.
      operationId: createSpend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpendRequest"
            example:
              platform: anthropic
              date: "2026-07-01"
              amount_usd: 25.0
              granularity: monthly
              service_label: "Claude API"
              notes: "July API credits top-up"
      responses:
        "201":
          description: Spend record created.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendRecord"
              example:
                id: "0f9e8d7c-6b5a-4d3c-8b1a-2c3d4e5f6a7b"
                platform: anthropic
                date: "2026-07-01"
                amount_usd: 25.0
                granularity: monthly
                service_label: "Claude API"
                source: manual
                notes: "July API credits top-up"
                created_at: "2026-07-02T18:45:00Z"
                updated_at: "2026-07-02T18:45:00Z"
        "400":
          description: |
            Validation failure (ApiError envelope) or malformed JSON syntax
            (text/plain, generated by the axum Json extractor before the
            handler runs). Validation runs in order: platform empty, platform
            length, platform value, date format, amount sign, granularity
            value, service_label length, notes length; the first failure wins.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                emptyPlatform:
                  summary: Platform empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "platform must not be empty"
                    details:
                      field: platform
                      constraint: "must not be empty"
                platformTooLong:
                  summary: Platform longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "platform exceeds maximum length"
                    details:
                      field: platform
                      constraint: "max 255 characters"
                invalidPlatform:
                  summary: Platform not in the accepted set
                  value:
                    code: VALIDATION_ERROR
                    message: "invalid platform"
                    details:
                      field: platform
                      valid_values:
                        - gcp
                        - flyio
                        - anthropic
                        - github_copilot
                        - github
                        - aws
                badDate:
                  summary: Date not in YYYY-MM-DD format
                  value:
                    code: VALIDATION_ERROR
                    message: "date must be YYYY-MM-DD format"
                    details:
                      field: date
                      constraint: "YYYY-MM-DD format"
                negativeAmount:
                  summary: Negative amount_usd
                  value:
                    code: VALIDATION_ERROR
                    message: "amount_usd must be non-negative"
                    details:
                      field: amount_usd
                      constraint: "must be non-negative"
                invalidGranularity:
                  summary: Granularity not daily or monthly
                  value:
                    code: VALIDATION_ERROR
                    message: "invalid granularity"
                    details:
                      field: granularity
                      valid_values:
                        - daily
                        - monthly
                serviceLabelTooLong:
                  summary: service_label longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "service_label exceeds maximum length"
                    details:
                      field: service_label
                      constraint: "max 255 characters"
                notesTooLong:
                  summary: notes longer than 1000 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "notes exceeds maximum length"
                    details:
                      field: notes
                      constraint: "max 1000 characters"
            text/plain:
              schema:
                type: string
              example: "Failed to parse the request body as JSON: expected value at line 1 column 1"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/spend/summary:
    get:
      tags:
        - Spend
      summary: Get spend summary
      description: |
        Returns aggregated spend: the overall total, totals grouped by
        platform (ordered by platform ascending), and totals grouped by month
        (the first 7 characters of the record date, YYYY-MM, ordered
        ascending). Optional inclusive date_from and date_to filters apply to
        all three aggregations. Both filters are free-form strings compared
        against the stored YYYY-MM-DD text; date values are never
        format-validated, so an invalid date is not rejected with 400 and
        simply filters lexically. The only 400 on this operation is the axum
        Query extractor rejection for a malformed query string, for example
        the same parameter given twice. Read tier: 60 rps at the gateway.
      operationId: getSpendSummary
      parameters:
        - name: date_from
          in: query
          required: false
          description: "Inclusive lower bound on the record date (YYYY-MM-DD)."
          schema:
            type: string
            format: date
          example: "2026-06-01"
        - name: date_to
          in: query
          required: false
          description: "Inclusive upper bound on the record date (YYYY-MM-DD)."
          schema:
            type: string
            format: date
          example: "2026-07-31"
      responses:
        "200":
          description: Aggregated spend summary.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendSummary"
              example:
                total_usd: 42.87
                by_platform:
                  - platform: anthropic
                    total_usd: 25.0
                  - platform: aws
                    total_usd: 3.12
                  - platform: gcp
                    total_usd: 14.75
                by_month:
                  - month: "2026-06"
                    total_usd: 18.4
                  - month: "2026-07"
                    total_usd: 24.47
        "400":
          description: |
            Malformed query string, for example the same parameter given
            twice. Generated by the axum Query extractor before the handler
            runs; the body is text/plain, not the ApiError envelope. Invalid
            date values do not trigger this response; they are passed through
            unvalidated.
          content:
            text/plain:
              schema:
                type: string
              example: "Failed to deserialize query string: duplicate field `date_from`"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/spend/sync/gcp:
    post:
      tags:
        - Sync
      summary: Sync GCP billing
      description: |
        Pulls the last 30 days of GCP spend from the BigQuery billing export
        (grouped by service and day) and inserts daily records with platform
        "gcp" and source "bigquery". Duplicate rows are skipped via ON
        CONFLICT DO NOTHING and counted in records_skipped. Requires the
        GCP_BILLING_SA_KEY, GCP_BILLING_PROJECT_ID, GCP_BILLING_DATASET, and
        GCP_BILLING_TABLE environment variables on the server. No request
        body. Configuration, upstream, and per-row insert failures do NOT
        produce error status codes: the handler always returns 200 with any
        failures listed in the errors array. Write tier: 30 rps at the
        gateway.
      operationId: syncGcp
      responses:
        "200":
          description: |
            Sync attempt finished. Check the errors array: a misconfigured or
            failing sync still returns 200 with zero imports and one or more
            error strings.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"
              examples:
                imported:
                  summary: Successful pull with deduplication
                  value:
                    platform: gcp
                    records_imported: 12
                    records_skipped: 18
                    errors: []
                notConfigured:
                  summary: Missing server configuration
                  value:
                    platform: gcp
                    records_imported: 0
                    records_skipped: 0
                    errors:
                      - "GCP_BILLING_SA_KEY not configured"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/spend/sync/flyio:
    post:
      tags:
        - Sync
      summary: Sync Fly.io billing
      description: |
        Queries the Fly.io GraphQL API for each organization's outstanding
        creditBalance (Fly.io removed per-invoice history from the public
        API) and records a monthly snapshot dated the first of the current
        month with platform "flyio" and source "flyio_graphql". Organizations
        with a non-positive balance are counted in records_skipped, as are
        duplicate month snapshots (ON CONFLICT DO NOTHING). Requires the
        FLYIO_API_TOKEN environment variable on the server. No request body.
        Configuration, upstream, and per-row insert failures do NOT produce
        error status codes: the handler always returns 200 with any failures
        listed in the errors array. Write tier: 30 rps at the gateway.
      operationId: syncFlyio
      responses:
        "200":
          description: |
            Sync attempt finished. Check the errors array: a misconfigured or
            failing sync still returns 200 with zero imports and one or more
            error strings.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"
              examples:
                imported:
                  summary: Monthly snapshot recorded for one organization
                  value:
                    platform: flyio
                    records_imported: 1
                    records_skipped: 0
                    errors: []
                notConfigured:
                  summary: Missing server configuration
                  value:
                    platform: flyio
                    records_imported: 0
                    records_skipped: 0
                    errors:
                      - "FLYIO_API_TOKEN not configured"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/spend/sync/github:
    post:
      tags:
        - Sync
      summary: Sync GitHub billing
      description: |
        Pulls GitHub Actions minutes and shared storage billing from the
        GitHub REST API and records monthly snapshots dated the first of the
        current month with platform "github" and source "github_api". Paid
        Actions minutes are priced at 0.008 USD per minute. Zero-spend
        results and duplicate month snapshots are counted in records_skipped;
        a 404 from the Actions billing endpoint (free-tier account) is
        treated as zero spend. Storage endpoint failures are non-fatal and
        silently ignored. Requires the GITHUB_BILLING_TOKEN and
        GITHUB_BILLING_USERNAME environment variables on the server. No
        request body. Configuration, upstream, and per-row insert failures do
        NOT produce error status codes: the handler always returns 200 with
        any failures listed in the errors array. Write tier: 30 rps at the
        gateway.
      operationId: syncGithub
      responses:
        "200":
          description: |
            Sync attempt finished. Check the errors array: a misconfigured or
            failing sync still returns 200 with zero imports and one or more
            error strings.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"
              examples:
                imported:
                  summary: Actions overage recorded, storage at zero
                  value:
                    platform: github
                    records_imported: 1
                    records_skipped: 1
                    errors: []
                notConfigured:
                  summary: Missing server configuration
                  value:
                    platform: github
                    records_imported: 0
                    records_skipped: 0
                    errors:
                      - "GITHUB_BILLING_TOKEN not configured"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/spend/sync/aws:
    post:
      tags:
        - Sync
      summary: Sync AWS billing
      description: |
        Pulls the last 30 days of AWS spend from Cost Explorer (SigV4-signed
        GetCostAndUsage, monthly granularity, grouped by service) and inserts
        monthly records dated the first of each result month with platform
        "aws" and source "aws_cost_explorer". Zero or negative amounts are
        ignored; duplicate rows are skipped via ON CONFLICT DO NOTHING and
        counted in records_skipped. Requires the AWS_BILLING_ACCESS_KEY_ID
        and AWS_BILLING_SECRET_ACCESS_KEY environment variables on the
        server. No request body. Configuration, upstream, and per-row insert
        failures do NOT produce error status codes: the handler always
        returns 200 with any failures listed in the errors array. Write tier:
        30 rps at the gateway.
      operationId: syncAws
      responses:
        "200":
          description: |
            Sync attempt finished. Check the errors array: a misconfigured or
            failing sync still returns 200 with zero imports and one or more
            error strings.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"
              examples:
                imported:
                  summary: Two service-month rows imported
                  value:
                    platform: aws
                    records_imported: 2
                    records_skipped: 3
                    errors: []
                notConfigured:
                  summary: Missing server configuration
                  value:
                    platform: aws
                    records_imported: 0
                    records_skipped: 0
                    errors:
                      - "AWS_BILLING_ACCESS_KEY_ID not configured"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/spend/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: "Spend record ID (UUID v4, stored as TEXT)."
        schema:
          type: string
          format: uuid
        example: "0f9e8d7c-6b5a-4d3c-8b1a-2c3d4e5f6a7b"
    get:
      tags:
        - Spend
      summary: Get a spend record
      description: |
        Fetches a single spend record by ID. Returns 404 when no record with
        that ID exists. Read tier: 60 rps at the gateway.
      operationId: getSpend
      responses:
        "200":
          description: The requested spend record.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendRecord"
              example:
                id: "0f9e8d7c-6b5a-4d3c-8b1a-2c3d4e5f6a7b"
                platform: anthropic
                date: "2026-07-01"
                amount_usd: 25.0
                granularity: monthly
                service_label: "Claude API"
                source: manual
                notes: "July API credits top-up"
                created_at: "2026-07-02T18:45:00Z"
                updated_at: "2026-07-02T18:45:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - Spend
      summary: Update a spend record
      description: |
        Partial update of a manual spend record. Only records with source
        "manual" can be edited; automated records (any other source) return
        403. Omitted fields keep their stored values. platform, date,
        amount_usd, and granularity are validated with the same rules as
        creation when provided. Sending service_label or notes as an empty or
        whitespace-only string clears the field to null. id, source, and
        created_at never change; updated_at is refreshed on success.
        Write tier: 30 rps at the gateway.
      operationId: updateSpend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSpendRequest"
            example:
              amount_usd: 27.5
              notes: "Adjusted after invoice reconciliation"
      responses:
        "200":
          description: The updated spend record.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendRecord"
              example:
                id: "0f9e8d7c-6b5a-4d3c-8b1a-2c3d4e5f6a7b"
                platform: anthropic
                date: "2026-07-01"
                amount_usd: 27.5
                granularity: monthly
                service_label: "Claude API"
                source: manual
                notes: "Adjusted after invoice reconciliation"
                created_at: "2026-07-02T18:45:00Z"
                updated_at: "2026-07-18T16:45:00Z"
        "400":
          description: |
            Validation failure (ApiError envelope) or malformed JSON syntax
            (text/plain, generated by the axum Json extractor before the
            handler runs). Field validation uses the same error shapes as
            creation; see the createSpend 400 examples. Validation runs only
            after the record is found and confirmed manual, so 404 and 403
            take precedence over 400 validation errors.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                emptyPlatform:
                  summary: Platform provided but empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "platform must not be empty"
                    details:
                      field: platform
                      constraint: "must not be empty"
                invalidPlatform:
                  summary: Platform not in the accepted set
                  value:
                    code: VALIDATION_ERROR
                    message: "invalid platform"
                    details:
                      field: platform
                      valid_values:
                        - gcp
                        - flyio
                        - anthropic
                        - github_copilot
                        - github
                        - aws
                badDate:
                  summary: Date not in YYYY-MM-DD format
                  value:
                    code: VALIDATION_ERROR
                    message: "date must be YYYY-MM-DD format"
                    details:
                      field: date
                      constraint: "YYYY-MM-DD format"
                negativeAmount:
                  summary: Negative amount_usd
                  value:
                    code: VALIDATION_ERROR
                    message: "amount_usd must be non-negative"
                    details:
                      field: amount_usd
                      constraint: "must be non-negative"
                invalidGranularity:
                  summary: Granularity not daily or monthly
                  value:
                    code: VALIDATION_ERROR
                    message: "invalid granularity"
                    details:
                      field: granularity
                      valid_values:
                        - daily
                        - monthly
                serviceLabelTooLong:
                  summary: service_label longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "service_label exceeds maximum length"
                    details:
                      field: service_label
                      constraint: "max 255 characters"
                notesTooLong:
                  summary: notes longer than 1000 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "notes exceeds maximum length"
                    details:
                      field: notes
                      constraint: "max 1000 characters"
            text/plain:
              schema:
                type: string
              example: "Failed to parse the request body as JSON: expected value at line 1 column 1"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            The record's source is not "manual". Automated records (bigquery,
            flyio_graphql, github_api, aws_cost_explorer) cannot be edited.
            This is a record-source guard, not a role check.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                code: FORBIDDEN
                message: "automated records cannot be edited"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Spend
      summary: Delete a spend record
      description: |
        Deletes a manual spend record by ID. Only records with source
        "manual" can be deleted; automated records (any other source) return
        403. Returns 204 with no body on success, 404 when no record with
        that ID exists. Write tier: 30 rps at the gateway.
      operationId: deleteSpend
      responses:
        "204":
          description: Spend record deleted. No response body.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: |
            The record's source is not "manual". Automated records (bigquery,
            flyio_graphql, github_api, aws_cost_explorer) cannot be deleted.
            This is a record-source guard, not a role check.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                code: FORBIDDEN
                message: "automated records cannot be deleted"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer JWT issued by auth-service. Validated in-handler with HS256 by
        default (AUTH_JWT_ALGORITHM also accepts HS384, HS512, RS256, RS384,
        RS512). The token must carry an exp claim and an iss claim matching
        AUTH_ISSUER (default "auth-service"). The sub claim identifies the
        caller for audit logging. The roles claim is parsed but NOT enforced
        on main as of 2026-07-18; admin role gating is planned and arrives
        with the refactor/adopt-axum-api-kit branch.
  schemas:
    SpendRecord:
      type: object
      description: |
        A single spend record. IDs, dates, and timestamps are stored as TEXT.
        Nullable fields (service_label, notes) are always serialized, as null
        when unset.
      required:
        - id
        - platform
        - date
        - amount_usd
        - granularity
        - service_label
        - source
        - notes
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: "Record ID, a UUID v4 generated at creation."
          example: "0f9e8d7c-6b5a-4d3c-8b1a-2c3d4e5f6a7b"
        platform:
          type: string
          enum:
            - gcp
            - flyio
            - anthropic
            - github_copilot
            - github
            - aws
          description: "Cloud platform the spend belongs to. Stored lowercase."
          example: gcp
        date:
          type: string
          format: date
          description: "Spend date in YYYY-MM-DD format. Monthly records use the first of the month."
          example: "2026-07-15"
        amount_usd:
          type: number
          format: double
          minimum: 0
          description: "Spend amount in US dollars. Non-negative."
          example: 4.37
        granularity:
          type: string
          enum:
            - daily
            - monthly
          description: "Whether the record covers a single day or a whole month."
          example: daily
        service_label:
          type: string
          nullable: true
          maxLength: 255
          description: "Human-readable service breakdown label. Null when not set; serialized as null, never omitted."
          example: "Cloud Run"
        source:
          type: string
          enum:
            - manual
            - bigquery
            - flyio_graphql
            - github_api
            - aws_cost_explorer
          description: |
            Where the record came from. "manual" records are created via POST
            and are the only records that can be updated or deleted; all
            other sources are written by the sync endpoints.
          example: bigquery
        notes:
          type: string
          nullable: true
          maxLength: 1000
          description: "Free-form notes. Null when not set; serialized as null, never omitted."
          example: null
        created_at:
          type: string
          format: date-time
          description: "Creation timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision)."
          example: "2026-07-16T02:00:00Z"
        updated_at:
          type: string
          format: date-time
          description: "Last update timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision)."
          example: "2026-07-16T02:00:00Z"
    CreateSpendRequest:
      type: object
      required:
        - platform
        - date
        - amount_usd
      properties:
        platform:
          type: string
          enum:
            - gcp
            - flyio
            - anthropic
            - github_copilot
            - github
            - aws
          description: "Platform for the spend. Trimmed and lowercased server-side, then validated against the accepted set."
          example: anthropic
        date:
          type: string
          format: date
          description: "Spend date. Must parse as YYYY-MM-DD."
          example: "2026-07-01"
        amount_usd:
          type: number
          format: double
          minimum: 0
          description: "Spend amount in US dollars. Must be non-negative."
          example: 25.0
        granularity:
          type: string
          enum:
            - daily
            - monthly
          default: daily
          description: "Record granularity. Trimmed server-side. Defaults to daily when omitted."
          example: monthly
        service_label:
          type: string
          nullable: true
          maxLength: 255
          description: "Service breakdown label. Trimmed; blank or whitespace-only values are stored as null."
          example: "Claude API"
        notes:
          type: string
          nullable: true
          maxLength: 1000
          description: "Free-form notes. Trimmed; blank or whitespace-only values are stored as null."
          example: "July API credits top-up"
    UpdateSpendRequest:
      type: object
      description: |
        Partial update. Every field is optional; omitted fields keep their
        stored values. Only records with source "manual" can be updated.
      properties:
        platform:
          type: string
          enum:
            - gcp
            - flyio
            - anthropic
            - github_copilot
            - github
            - aws
          description: "New platform. Trimmed and lowercased server-side; an empty value is rejected with 400."
          example: gcp
        date:
          type: string
          format: date
          description: "New spend date. Must parse as YYYY-MM-DD."
          example: "2026-07-15"
        amount_usd:
          type: number
          format: double
          minimum: 0
          description: "New amount in US dollars. Must be non-negative."
          example: 27.5
        granularity:
          type: string
          enum:
            - daily
            - monthly
          description: "New granularity. Trimmed server-side."
          example: monthly
        service_label:
          type: string
          nullable: true
          maxLength: 255
          description: "New service label. An empty or whitespace-only value clears the field to null."
          example: "Claude API"
        notes:
          type: string
          nullable: true
          maxLength: 1000
          description: "New notes. An empty or whitespace-only value clears the field to null."
          example: "Adjusted after invoice reconciliation"
    ListSpendResponse:
      type: object
      required:
        - data
        - total
        - limit
        - offset
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SpendRecord"
        total:
          type: integer
          format: int64
          description: "Total number of rows matching the filters, ignoring pagination."
          example: 2
        limit:
          type: integer
          description: "Effective limit after clamping to the range 1 to 200."
          example: 50
        offset:
          type: integer
          description: "Effective offset applied to the query."
          example: 0
    SpendSummary:
      type: object
      required:
        - total_usd
        - by_platform
        - by_month
      properties:
        total_usd:
          type: number
          format: double
          description: "Sum of amount_usd across all matching records. 0 when nothing matches."
          example: 42.87
        by_platform:
          type: array
          description: "Per-platform totals, ordered by platform ascending."
          items:
            $ref: "#/components/schemas/PlatformTotal"
        by_month:
          type: array
          description: "Per-month totals, ordered by month ascending."
          items:
            $ref: "#/components/schemas/MonthTotal"
    PlatformTotal:
      type: object
      required:
        - platform
        - total_usd
      properties:
        platform:
          type: string
          description: "Platform name as stored on the records."
          example: gcp
        total_usd:
          type: number
          format: double
          example: 14.75
    MonthTotal:
      type: object
      required:
        - month
        - total_usd
      properties:
        month:
          type: string
          description: "Calendar month in YYYY-MM format (first 7 characters of the record date)."
          example: "2026-07"
        total_usd:
          type: number
          format: double
          example: 24.47
    SyncResult:
      type: object
      description: |
        Outcome of a billing sync pull. Always returned with HTTP 200, even
        when the sync could not run; failures appear in the errors array.
      required:
        - platform
        - records_imported
        - records_skipped
        - errors
      properties:
        platform:
          type: string
          enum:
            - gcp
            - flyio
            - github
            - aws
          description: "Platform this sync targets."
          example: gcp
        records_imported:
          type: integer
          minimum: 0
          description: "Rows newly inserted by this pull."
          example: 12
        records_skipped:
          type: integer
          minimum: 0
          description: "Rows skipped as duplicates (ON CONFLICT DO NOTHING) or as zero-spend results."
          example: 18
        errors:
          type: array
          description: "Human-readable failure strings (missing configuration, upstream errors, per-row insert errors). Empty on a clean run."
          items:
            type: string
          example: []
    ApiError:
      type: object
      description: "Standard platform error envelope. details is omitted when absent, never null."
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: "Machine-readable error code."
          example: VALIDATION_ERROR
        message:
          type: string
          description: "Human-readable error message."
          example: "platform must not be empty"
        details:
          description: "Optional structured context, for example the offending field and constraint."
          example:
            field: platform
            constraint: "must not be empty"
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
          example: ok
        error:
          type: string
          description: "Database error string. Present only when status is degraded."
          example: "pool timed out while waiting for an open connection"
  headers:
    XRateLimitLimit:
      description: |
        Requests per second allowed for the matched route tier, per client IP.
        Platform tiers (enforced by go-gateway since v1.10): auth 5 rps,
        write 30 rps, read 60 rps. Absent when the service is called directly
        without the gateway.
      schema:
        type: integer
      example: 60
    XRateLimitRemaining:
      description: "Requests remaining in the current token bucket for this client and route tier."
      schema:
        type: integer
      example: 59
    XRateLimitReset:
      description: "Unix epoch second at which the bucket refills."
      schema:
        type: integer
        format: int64
      example: 1784822400
  responses:
    Unauthorized:
      description: "Missing, malformed, or invalid bearer token."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            missingHeader:
              summary: No Authorization header
              value:
                code: AUTH_REQUIRED
                message: "authorization header is required"
            invalidFormat:
              summary: Header is not exactly Bearer plus one token
              value:
                code: AUTH_INVALID_FORMAT
                message: "authorization header format must be 'Bearer <token>'"
            invalidToken:
              summary: Signature, expiry, or issuer validation failed
              value:
                code: AUTH_INVALID_TOKEN
                message: "token validation failed"
    NotFound:
      description: "No spend record with the given ID exists."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: NOT_FOUND
            message: "spend record not found"
    UnprocessableEntity:
      description: |
        JSON body parsed but failed deserialization into the request type,
        for example a missing required field or a wrong type. Generated by
        the axum Json extractor before the handler runs; the body is
        text/plain, not the ApiError envelope. On PATCH only wrong types can
        trigger this, since every field is optional.
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        text/plain:
          schema:
            type: string
          example: "Failed to deserialize the JSON body into the target type: missing field `platform` at line 1 column 2"
    RateLimited:
      description: |
        Rate limit exceeded for the matched route tier. Returned by go-gateway,
        not by this service; direct calls to the service are never rate
        limited. The body follows the ApiError envelope without details.
      headers:
        Retry-After:
          description: "Seconds to wait before retrying."
          schema:
            type: integer
          example: 1
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: RATE_LIMITED
            message: "rate limit exceeded (30 req/s), retry after 1s"
    InternalError:
      description: "A database query failed."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: DB_ERROR
            message: "database error"
