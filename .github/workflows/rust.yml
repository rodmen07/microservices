name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Lint & test ────────────────────────────────────────────────────────────
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install sqlite3
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends sqlite3

      # All services are SQLite-backed. Create one DB per service from migrations.
      - name: Create test databases
        run: |
          sqlite3 /tmp/accounts.db      < accounts-service/migrations/0001_create_accounts.sql
          sqlite3 /tmp/contacts.db      < contacts-service/migrations/0001_create_contacts.sql
          sqlite3 /tmp/activities.db    < activities-service/migrations/0001_create_activities.sql
          sqlite3 /tmp/activities.db    < activities-service/migrations/0002_fix_completed_boolean.sql
          sqlite3 /tmp/workflows.db     < automation-service/migrations/0001_create_workflows.sql
          sqlite3 /tmp/connections.db   < integrations-service/migrations/0001_create_connections.sql
          sqlite3 /tmp/opportunities.db < opportunities-service/migrations/0001_create_opportunities.sql
          sqlite3 /tmp/reports.db       < reporting-service/migrations/0001_create_reports.sql
          sqlite3 /tmp/documents.db     < search-service/migrations/0001_create_search_documents.sql
          sqlite3 /tmp/spend.db         < spend-service/migrations/0001_create_spend_records.sql

      - name: Clippy — all services
        run: |
          DATABASE_URL=sqlite:////tmp/accounts.db      cargo clippy -p accounts-service      -- -D warnings
          DATABASE_URL=sqlite:////tmp/contacts.db      cargo clippy -p contacts-service      -- -D warnings
          DATABASE_URL=sqlite:////tmp/activities.db    cargo clippy -p activities-service    -- -D warnings
          DATABASE_URL=sqlite:////tmp/workflows.db     cargo clippy -p automation-service    -- -D warnings
          DATABASE_URL=sqlite:////tmp/connections.db   cargo clippy -p integrations-service  -- -D warnings
          DATABASE_URL=sqlite:////tmp/opportunities.db cargo clippy -p opportunities-service -- -D warnings
          DATABASE_URL=sqlite:////tmp/reports.db       cargo clippy -p reporting-service     -- -D warnings
          DATABASE_URL=sqlite:////tmp/documents.db     cargo clippy -p search-service        -- -D warnings
          DATABASE_URL=sqlite:////tmp/spend.db         cargo clippy -p spend-service         -- -D warnings

      - name: Test — all services
        env:
          AUTH_JWT_SECRET: dev-insecure-secret-change-me
          ALLOWED_ORIGINS: http://localhost:5173
        run: |
          DATABASE_URL=sqlite:////tmp/accounts.db      cargo test -p accounts-service
          DATABASE_URL=sqlite:////tmp/contacts.db      cargo test -p contacts-service
          DATABASE_URL=sqlite:////tmp/activities.db    cargo test -p activities-service
          DATABASE_URL=sqlite:////tmp/workflows.db     cargo test -p automation-service
          DATABASE_URL=sqlite:////tmp/connections.db   cargo test -p integrations-service
          DATABASE_URL=sqlite:////tmp/opportunities.db cargo test -p opportunities-service
          DATABASE_URL=sqlite:////tmp/reports.db       cargo test -p reporting-service
          DATABASE_URL=sqlite:////tmp/documents.db     cargo test -p search-service
          DATABASE_URL=sqlite:////tmp/spend.db         cargo test -p spend-service

  # ─── Dependency security audit ──────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        # RUSTSEC-2023-0071: rsa Marvin Attack — no patch available in rsa 0.9.x.
        # All services default to HS256; RSA is only used for token verification
        # on controlled infrastructure. Risk accepted until upstream ships a fix.
        run: cargo audit --ignore RUSTSEC-2023-0071

  # ─── Deploy to Google Cloud Run (main branch only) ─────────────────────────
  #
  # Required GitHub configuration:
  # - Repository variable GCP_PROJECT_ID: target Google Cloud project ID
  # - Repository secret GCP_WORKLOAD_IDENTITY_PROVIDER: full WIF provider resource name
  #     projects/PROJECT_NUM/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
  # - Repository secret GCP_SERVICE_ACCOUNT: deployer SA email
  #     deployer@PROJECT_ID.iam.gserviceaccount.com
  #
  # The SA needs roles: Artifact Registry Writer, Cloud Run Developer.
  # The WIF pool must trust this repo: attribute.repository=="rodmen07/microservices"
  #
  # Services are deployed in parallel after tests pass.
  deploy:
    name: Deploy ${{ matrix.service }}
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC token exchange with GCP WIF
    strategy:
      fail-fast: false   # one service failing doesn't abort the others
      matrix:
        include:
          - service: accounts-service
            dockerfile: accounts-service/Dockerfile
            cloud_run_service: accounts-service
            db_name: accounts
          - service: contacts-service
            dockerfile: contacts-service/Dockerfile
            cloud_run_service: contacts-service
            db_name: contacts
          - service: activities-service
            dockerfile: activities-service/Dockerfile
            cloud_run_service: activities-service
            db_name: activities
          - service: automation-service
            dockerfile: automation-service/Dockerfile
            cloud_run_service: automation-service
            db_name: workflows
          - service: integrations-service
            dockerfile: integrations-service/Dockerfile
            cloud_run_service: integrations-service
            db_name: connections
          - service: opportunities-service
            dockerfile: opportunities-service/Dockerfile
            cloud_run_service: opportunities-service
            db_name: opportunities
          - service: reporting-service
            dockerfile: reporting-service/Dockerfile
            cloud_run_service: reporting-service
            db_name: reports
          - service: search-service
            dockerfile: search-service/Dockerfile
            cloud_run_service: search-service
            db_name: documents
          - service: spend-service
            dockerfile: spend-service/Dockerfile
            cloud_run_service: spend-service
            db_name: spend

    env:
      GCP_REGION: us-central1
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy configuration
        id: deploy_config
        run: |
          if [ -z "${{ env.GCP_PROJECT_ID }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy: repository variable GCP_PROJECT_ID is not set."
            exit 0
          fi

          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy: repository secret GCP_WORKLOAD_IDENTITY_PROVIDER is not set."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Deploy configuration diagnostics
        run: |
          if [ -n "${{ env.GCP_PROJECT_ID }}" ]; then
            echo "GCP_PROJECT_ID: present"
          else
            echo "GCP_PROJECT_ID: missing"
          fi

          echo "GCP_WORKLOAD_IDENTITY_PROVIDER: ${HAS_WIF}"
          echo "GCP_SERVICE_ACCOUNT: ${HAS_SA}"
          echo "Deploy enabled: ${{ steps.deploy_config.outputs.enabled }}"
        env:
          HAS_WIF: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' }}
          HAS_SA: ${{ secrets.GCP_SERVICE_ACCOUNT != '' }}

      - name: Authenticate to Google Cloud
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: steps.deploy_config.outputs.enabled == 'true'
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/microservices/${{ matrix.service }}:${{ github.sha }}"
          docker build -f "${{ matrix.dockerfile }}" -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          gcloud run deploy "${{ matrix.cloud_run_service }}" \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --service-account "${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --set-env-vars "^#^DATABASE_URL=sqlite:////tmp/${{ matrix.db_name }}.db#AUTH_JWT_ALGORITHM=HS256#AUTH_ISSUER=auth-service#ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}" \
            --set-secrets "AUTH_JWT_SECRET=AUTH_JWT_SECRET:latest" \
            --quiet

      - name: Allow unauthenticated access
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          gcloud run services add-iam-policy-binding "${{ matrix.cloud_run_service }}" \
            --region "${{ env.GCP_REGION }}" \
            --member="allUsers" \
            --role="roles/run.invoker"
