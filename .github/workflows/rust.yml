name: CI/CD

# NOTE: There is intentionally NO `paths-ignore` on any trigger below.
#
# `paths-ignore` is a WORKFLOW-LEVEL filter: when it excludes a change the
# whole workflow is *skipped*, and a skipped workflow creates NO check runs.
# Branch protection then sees the required contexts "Lint and test" and
# "Security audit" as permanently "Pending" and blocks the PR forever (this
# is exactly what stranded the README-only PR #114). A required check can
# only *clear* if its check run is actually created, which requires the
# workflow to trigger. So the workflow now ALWAYS triggers on PRs and main
# pushes, and the cheap-vs-expensive decision is made INSIDE the jobs via the
# `changes` detector below (docs-only -> the required jobs skip, and a job
# skipped by its own `if:` reports a PASSING conclusion that satisfies the
# gate; anything touching code runs the real clippy/test/audit).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Cancel any in-progress run for the same branch when a new push arrives.
# This prevents two concurrent deploys from racing on the same Cloud Run
# service and hitting GCP's optimistic-concurrency (ETag) conflict.
#
# Both required contexts are emitted by THIS single workflow, so any
# superseding run re-reports both of them on the new head sha; a cancelled
# run is always replaced by a fresh green (or real) one for the same context.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Change detection (docs vs code) ────────────────────────────────────────
  #
  # Dependency-free classifier (git diff + grep, ~15s). It outputs a single
  # boolean `code`. The DOCS set below mirrors the old workflow-level
  # paths-ignore globs; a change is docs-only ONLY when EVERY changed file
  # matches one of them. Everything else is CODE by fallthrough — Cargo.lock,
  # Cargo.toml, **/*.rs, **/migrations/**.sql, Dockerfiles, rust-toolchain.toml,
  # .cargo/config.toml, build.rs, and .github/workflows/rust.yml itself. This
  # defaults CLOSED: an unrecognised file always runs full CI, so a dependency
  # bump, a migration, a toolchain change, or a gate-weakening workflow edit can
  # never masquerade as docs and merge unbuilt.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.classify.outputs.code }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the PR merge-base and the push before-sha are both
          # present locally; a shallow checkout would make the diff empty/error.
          fetch-depth: 0

      - name: Classify changed files (docs vs code)
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -u

          emit() { echo "code=$1" >> "$GITHUB_OUTPUT"; echo "==> classification: code=$1"; }

          # Docs allowlist, mirrored 1:1 from the old paths-ignore. NOTE it does
          # NOT include .github/workflows/rust.yml — edits to this gate must run
          # the gate. Only openapi-validation.yml (a different workflow) is docs.
          DOCS_RE='(\.md$)|(^docs/)|(^postman/)|(^sdks/)|((^|/)openapi\.yaml$)|(^\.github/workflows/openapi-validation\.yml$)'

          case "$EVENT_NAME" in
            pull_request)
              # Classify by the CUMULATIVE base...head diff (merge-base to head),
              # never the per-push delta, so a later docs-only push on a PR whose
              # earlier commit touched Rust is still correctly classified as code.
              if [ -z "$PR_BASE_SHA" ] || [ -z "$PR_HEAD_SHA" ]; then
                echo "Missing PR base/head sha; failing closed (code)."; emit true; exit 0
              fi
              git fetch --no-tags --quiet origin "$PR_BASE_SHA" "$PR_HEAD_SHA" 2>/dev/null || true
              RANGE="$PR_BASE_SHA...$PR_HEAD_SHA"
              ;;
            push)
              # New branch / force-push leaves an all-zero before-sha: fail closed.
              if printf '%s' "$PUSH_BEFORE" | grep -Eq '^0+$'; then
                echo "No usable before-sha (new branch/force push); failing closed (code)."; emit true; exit 0
              fi
              RANGE="$PUSH_BEFORE..$PUSH_AFTER"
              ;;
            *)
              # workflow_dispatch or anything else: always run full CI.
              echo "Event '$EVENT_NAME' is not pull_request/push; running full CI (code)."; emit true; exit 0
              ;;
          esac

          if ! CHANGED=$(git diff --name-only "$RANGE" 2>/dev/null); then
            echo "git diff failed for range '$RANGE'; failing closed (code)."; emit true; exit 0
          fi

          if [ -z "$CHANGED" ]; then
            echo "Empty diff for range '$RANGE'; failing closed (code)."; emit true; exit 0
          fi

          echo "Changed files in range '$RANGE':"
          printf '  %s\n' $CHANGED

          # Non-docs = any changed path that does NOT match the docs allowlist.
          NON_DOCS=$(printf '%s\n' "$CHANGED" | grep -Ev "$DOCS_RE" || true)

          if [ -n "$NON_DOCS" ]; then
            echo "Non-docs (code) files present:"
            printf '  %s\n' $NON_DOCS
            emit true
          else
            echo "Every changed file is docs; test/audit will skip (skipped == passing)."
            emit false
          fi

  # ─── Lint & test ────────────────────────────────────────────────────────────
  #
  # Required context: "Lint and test" (branch protection keys on this exact
  # string). Single, non-matrixed job so the emitted context is the bare job
  # name, never "Lint and test (accounts-service)" or "CI/CD / Lint and test".
  #
  # Gate: runs for real whenever code changed OR the detector could not prove
  # docs-only. `always()` is required so a FAILED/CANCELLED detector still lets
  # this job evaluate (default `success()` gating would skip it — fail-open — on
  # a detector hiccup). The `!= 'false'` test is fail-closed: only an explicit
  # `code=false` skips; an empty/garbled output runs the full suite. On a
  # docs-only change the job is skipped-by-conditional, which branch protection
  # treats as a passing conclusion, so "Lint and test" clears green.
  test:
    name: Lint and test
    needs: [changes]
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.code != 'false')
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      # Create one database per service. Migrations run automatically via
      # sqlx::migrate! when AppState::from_database_url is called in tests.
      - name: Create per-service test databases
        env:
          PGPASSWORD: postgres
        run: |
          for db in accounts contacts activities workflows connections opportunities reports documents spend projects audit; do
            psql -h localhost -U postgres -c "CREATE DATABASE ${db};"
          done

      - name: Clippy — all services
        run: |
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/accounts      cargo clippy -p accounts-service      -- -D warnings
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/contacts      cargo clippy -p contacts-service      -- -D warnings
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/activities    cargo clippy -p activities-service    -- -D warnings
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/workflows     cargo clippy -p automation-service    -- -D warnings
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/connections   cargo clippy -p integrations-service  -- -D warnings
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/opportunities cargo clippy -p opportunities-service -- -D warnings
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/reports       cargo clippy -p reporting-service     -- -D warnings
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/documents     cargo clippy -p search-service        -- -D warnings
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/spend         cargo clippy -p spend-service         -- -D warnings
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/projects      cargo clippy -p projects-service      -- -D warnings
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/audit         cargo clippy -p audit-service         -- -D warnings

      - name: Test — all services
        env:
          AUTH_JWT_SECRET: dev-insecure-secret-change-me
          ALLOWED_ORIGINS: http://localhost:5173
        run: |
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/accounts      cargo test -p accounts-service
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/contacts      cargo test -p contacts-service
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/activities    cargo test -p activities-service
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/workflows     cargo test -p automation-service
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/connections   cargo test -p integrations-service
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/opportunities cargo test -p opportunities-service
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/reports       cargo test -p reporting-service
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/documents     cargo test -p search-service
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/spend         cargo test -p spend-service
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/projects      cargo test -p projects-service
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/audit         cargo test -p audit-service

  # ─── Coverage (main only, parallel to Lint and test) ────────────────────────
  #
  # Split out of the `test` job on 2026-07-21. Measured from job 88619900319
  # (total 23m19s): `Test coverage` was 19m04s, i.e. 82% of the job, against
  # 1m15s for clippy and 2m00s for the tests themselves. Every PR paid all 19
  # minutes before a human saw a result, for an artifact nothing gates on —
  # there is no codecov config in this repo, so coverage is upload-only.
  #
  # It runs only on pushes to main: PR feedback drops to the ~4m of real
  # verification, and main still gets full coverage, now in parallel with the
  # test job rather than appended to it.
  #
  # 2026-07-22: also gated on the `changes` detector. Removing the workflow-level
  # paths-ignore means docs-only commits to main now trigger the workflow, but
  # coverage must NOT burn ~19m of tarpaulin on a change that touched no code, so
  # a docs-only main push skips this job (code == 'false'). `always()` keeps the
  # gate fail-closed: a detector failure still runs coverage. Code pushes to main
  # still get full coverage. This job never runs on PRs (event_name == 'push').
  #
  # This job creates its own databases in its own postgres service container, so
  # the old "Reset per-service test databases before coverage" step is gone: it
  # existed only because tarpaulin previously ran after the test suite had
  # already populated these same databases, and several tests assert exact row
  # counts without cleaning up after themselves. A fresh service container is
  # empty by construction.
  coverage:
    name: Coverage
    needs: [changes]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.changes.result != 'success' || needs.changes.outputs.code != 'false')

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Create per-service test databases
        env:
          PGPASSWORD: postgres
        run: |
          for db in accounts contacts activities workflows connections opportunities reports documents spend projects audit; do
            psql -h localhost -U postgres -c "CREATE DATABASE ${db};"
          done

      # Run tarpaulin once per service, mirroring the "Test all services" step above.
      # Each service needs its own DATABASE_URL (its own logical database), and cargo
      # tarpaulin cannot vary the env per -p when several packages are passed to a
      # single invocation, so a combined run leaves every test binary without a
      # database to connect to. A single shared database is not a safe alternative
      # either: each service's sqlx migrations assume an empty schema of its own and
      # are not namespaced against the other ten services, so merging them into one
      # database risks table-name collisions across otherwise-unrelated services.
      - name: Test coverage
        env:
          AUTH_JWT_SECRET: dev-insecure-secret-change-me
          ALLOWED_ORIGINS: http://localhost:5173
        run: |
          cargo install cargo-tarpaulin --locked
          mkdir -p coverage
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/accounts      cargo tarpaulin --out Xml --exclude-files tests/ -p accounts-service      --output-dir coverage/accounts
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/contacts      cargo tarpaulin --out Xml --exclude-files tests/ -p contacts-service      --output-dir coverage/contacts
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/activities    cargo tarpaulin --out Xml --exclude-files tests/ -p activities-service    --output-dir coverage/activities
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/workflows     cargo tarpaulin --out Xml --exclude-files tests/ -p automation-service    --output-dir coverage/workflows
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/connections   cargo tarpaulin --out Xml --exclude-files tests/ -p integrations-service  --output-dir coverage/connections
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/opportunities cargo tarpaulin --out Xml --exclude-files tests/ -p opportunities-service --output-dir coverage/opportunities
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/reports       cargo tarpaulin --out Xml --exclude-files tests/ -p reporting-service     --output-dir coverage/reports
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/documents     cargo tarpaulin --out Xml --exclude-files tests/ -p search-service        --output-dir coverage/documents
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/spend         cargo tarpaulin --out Xml --exclude-files tests/ -p spend-service         --output-dir coverage/spend
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/projects      cargo tarpaulin --out Xml --exclude-files tests/ -p projects-service      --output-dir coverage/projects
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/audit         cargo tarpaulin --out Xml --exclude-files tests/ -p audit-service         --output-dir coverage/audit

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/accounts/cobertura.xml,./coverage/contacts/cobertura.xml,./coverage/activities/cobertura.xml,./coverage/workflows/cobertura.xml,./coverage/connections/cobertura.xml,./coverage/opportunities/cobertura.xml,./coverage/reports/cobertura.xml,./coverage/documents/cobertura.xml,./coverage/spend/cobertura.xml,./coverage/projects/cobertura.xml,./coverage/audit/cobertura.xml

  # ─── Dependency security audit ──────────────────────────────────────────────
  #
  # Required context: "Security audit" (single, non-matrixed job — bare context
  # name for branch protection).
  #
  # Gate: SAME `code` boolean as `test`, NOT a narrower rust-source predicate.
  # cargo-audit keys entirely on Cargo.lock, and Cargo.lock/Cargo.toml are
  # classified as code (they are not in the docs allowlist), so ANY dependency
  # change — including a transitive bump that pulls in a RUSTSEC advisory — runs
  # this job for real. A docs-only change cannot alter the dependency graph, so
  # there is nothing for cargo-audit to check; the job is skipped-by-conditional
  # and its passing conclusion satisfies the required context. `always()` +
  # `!= 'false'` make it fail-closed on any detector failure (audit runs).
  audit:
    name: Security audit
    needs: [changes]
    if: always() && (needs.changes.result != 'success' || needs.changes.outputs.code != 'false')
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        # --deny warnings: without it, `cargo audit` exits 0 on `unsound` and
        # `yanked` advisories, so they accumulate silently. Four had (anyhow
        # RUSTSEC-2026-0190, rand RUSTSEC-2026-0097 on both the 0.8 and 0.9
        # lines, and a yanked spin 0.9.8) while every CI run stayed green. All
        # four are fixed in this commit's Cargo.lock, so the stricter gate
        # starts from a clean baseline; a new one now fails the build instead
        # of scrolling past.
        #
        # RUSTSEC-2023-0071: rsa Marvin Attack — no patch available in rsa 0.9.x.
        # All services default to HS256; RSA is only used for token verification
        # on controlled infrastructure. Risk accepted until upstream ships a fix.
        # This is the ONLY accepted advisory; every other finding must be fixed.
        run: cargo audit --deny warnings --ignore RUSTSEC-2023-0071

  # ─── Deploy to Google Cloud Run (main branch only) ─────────────────────────
  #
  # Unchanged. `needs: [test]` + main + push already rides the correct
  # invariant: on a docs-only main push `test` is SKIPPED, and a job whose
  # dependency is skipped is itself skipped under default success() gating, so
  # deploy does NOT run (no 11-service redeploy for a README change). On a code
  # push to main `test` runs and passes, so deploy runs. No `always()` here —
  # that would break the skip-propagation this relies on.
  #
  # Required GitHub configuration:
  # - Repository variable GCP_PROJECT_ID: target Google Cloud project ID
  # - Repository variable ALLOWED_ORIGINS: allowed CORS origins
  # - Repository secret GCP_WORKLOAD_IDENTITY_PROVIDER: full WIF provider resource name
  #     projects/PROJECT_NUM/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
  # - Repository secret GCP_SERVICE_ACCOUNT: deployer SA email
  #     deployer@PROJECT_ID.iam.gserviceaccount.com
  # - Repository secret AUTH_JWT_SECRET: shared JWT signing secret
  # - Per-service Secret Manager secrets (see db_secret in matrix below):
  #     Each secret holds the full Cloud SQL DATABASE_URL for that service, e.g.:
  #     postgres://appuser:pass@/accounts?host=/cloudsql/PROJECT:REGION:INSTANCE
  #
  # The SA needs roles: Artifact Registry Writer, Cloud Run Developer,
  #   Cloud SQL Client, Secret Manager Secret Accessor.
  # The WIF pool must trust this repo: attribute.repository=="rodmen07/microservices"
  #
  # Services are deployed in parallel after tests pass.
  deploy:
    name: Deploy ${{ matrix.service }}
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC token exchange with GCP WIF
    strategy:
      fail-fast: false   # one service failing doesn't abort the others
      matrix:
        include:
          - service: accounts-service
            dockerfile: accounts-service/Dockerfile
            cloud_run_service: accounts-service
            db_secret: DATABASE_URL_ACCOUNTS
          - service: contacts-service
            dockerfile: contacts-service/Dockerfile
            cloud_run_service: contacts-service
            db_secret: DATABASE_URL_CONTACTS
          - service: activities-service
            dockerfile: activities-service/Dockerfile
            cloud_run_service: activities-service
            db_secret: DATABASE_URL_ACTIVITIES
          - service: automation-service
            dockerfile: automation-service/Dockerfile
            cloud_run_service: automation-service
            db_secret: DATABASE_URL_AUTOMATION
          - service: integrations-service
            dockerfile: integrations-service/Dockerfile
            cloud_run_service: integrations-service
            db_secret: DATABASE_URL_INTEGRATIONS
          - service: opportunities-service
            dockerfile: opportunities-service/Dockerfile
            cloud_run_service: opportunities-service
            db_secret: DATABASE_URL_OPPORTUNITIES
          - service: reporting-service
            dockerfile: reporting-service/Dockerfile
            cloud_run_service: reporting-service
            db_secret: DATABASE_URL_REPORTING
          - service: search-service
            dockerfile: search-service/Dockerfile
            cloud_run_service: search-service
            db_secret: DATABASE_URL_SEARCH
          - service: spend-service
            dockerfile: spend-service/Dockerfile
            cloud_run_service: spend-service
            db_secret: DATABASE_URL_SPEND
            extra_secrets: "GCP_BILLING_SA_KEY=GCP_BILLING_SA_KEY:latest,FLYIO_API_TOKEN=FLYIO_API_TOKEN:latest,GITHUB_BILLING_TOKEN=GITHUB_BILLING_TOKEN:latest,GITHUB_BILLING_USERNAME=GITHUB_BILLING_USERNAME:latest,AWS_BILLING_ACCESS_KEY_ID=AWS_BILLING_ACCESS_KEY_ID:latest,AWS_BILLING_SECRET_ACCESS_KEY=AWS_BILLING_SECRET_ACCESS_KEY:latest"
            extra_env: "GCP_BILLING_PROJECT_ID=microservices-489413#GCP_BILLING_DATASET=billing_export#GCP_BILLING_TABLE=gcp_billing_export"
          - service: projects-service
            dockerfile: projects-service/Dockerfile
            cloud_run_service: projects-service
            db_secret: DATABASE_URL_PROJECTS
          - service: audit-service
            dockerfile: audit-service/Dockerfile
            cloud_run_service: audit-service
            db_secret: DATABASE_URL_AUDIT

    env:
      GCP_REGION: us-central1
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      CLOUD_SQL_INSTANCE: microservices-489413:us-south1:microservices-pg

    steps:
      - uses: actions/checkout@v7

      - name: Validate deploy configuration
        id: deploy_config
        run: |
          if [ -z "${{ env.GCP_PROJECT_ID }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy: repository variable GCP_PROJECT_ID is not set."
            exit 0
          fi

          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy: repository secret GCP_WORKLOAD_IDENTITY_PROVIDER is not set."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Deploy configuration diagnostics
        run: |
          if [ -n "${{ env.GCP_PROJECT_ID }}" ]; then
            echo "GCP_PROJECT_ID: present"
          else
            echo "GCP_PROJECT_ID: missing"
          fi

          echo "GCP_WORKLOAD_IDENTITY_PROVIDER: ${HAS_WIF}"
          echo "GCP_SERVICE_ACCOUNT: ${HAS_SA}"
          echo "Deploy enabled: ${{ steps.deploy_config.outputs.enabled }}"
        env:
          HAS_WIF: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' }}
          HAS_SA: ${{ secrets.GCP_SERVICE_ACCOUNT != '' }}

      - name: Authenticate to Google Cloud
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: steps.deploy_config.outputs.enabled == 'true'
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/microservices/${{ matrix.service }}:${{ github.sha }}"
          docker build -f "${{ matrix.dockerfile }}" -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          # Retry up to 3 times with backoff to handle transient GCP
          # optimistic-concurrency (ETag) conflicts (ABORTED status).
          #
          # `deployed` exists because the loop's last command used to be `sleep`,
          # which succeeds — so when all three attempts failed the step still
          # exited 0 and the job reported a successful deploy of nothing.
          deployed=false
          for attempt in 1 2 3; do
            gcloud run deploy "${{ matrix.cloud_run_service }}" \
              --image "$IMAGE" \
              --region "${{ env.GCP_REGION }}" \
              --platform managed \
              --port 8080 \
              --memory 512Mi \
              --cpu 1 \
              --min-instances 0 \
              --max-instances 3 \
              --service-account "${{ secrets.GCP_SERVICE_ACCOUNT }}" \
              --add-cloudsql-instances "${{ env.CLOUD_SQL_INSTANCE }}" \
              --set-env-vars "^#^AUTH_JWT_ALGORITHM=HS256#AUTH_ISSUER=auth-service#ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}${{ matrix.extra_env && format('#{0}', matrix.extra_env) || '' }}" \
              --set-secrets "AUTH_JWT_SECRET=AUTH_JWT_SECRET:latest,DATABASE_URL=${{ matrix.db_secret }}:latest${{ matrix.extra_secrets && format(',{0}', matrix.extra_secrets) || '' }}" \
              --quiet && { deployed=true; break; }
            echo "::warning::Deploy attempt $attempt failed for ${{ matrix.cloud_run_service }}. Retrying in $((attempt * 20))s..."
            sleep $((attempt * 20))
          done

          if [ "$deployed" != "true" ]; then
            echo "::error::Deploy failed for ${{ matrix.cloud_run_service }} after 3 attempts."
            exit 1
          fi

      - name: Allow unauthenticated access
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          gcloud run services add-iam-policy-binding "${{ matrix.cloud_run_service }}" \
            --region "${{ env.GCP_REGION }}" \
            --member="allUsers" \
            --role="roles/run.invoker"

      # A successful `gcloud run deploy` proves only that Cloud Run ACCEPTED the
      # revision — not that the container can serve. Between 2026-06-04 (Cloud SQL
      # deleted) and 2026-07-21 every service returned HTTP 503 to every request
      # while this job reported success on every single merge, because nothing
      # here ever asked the deployed service a question. This step asks.
      - name: Smoke test deployed service
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          URL=$(gcloud run services describe "${{ matrix.cloud_run_service }}" \
            --region "${{ env.GCP_REGION }}" \
            --format='value(status.url)')

          if [ -z "$URL" ]; then
            echo "::error::Could not resolve a URL for ${{ matrix.cloud_run_service }}."
            exit 1
          fi

          echo "Probing ${URL}/health"

          # Retries absorb cold start (min-instances=0, so the first request pays
          # container startup plus the Cloud SQL connection). They do NOT absorb a
          # genuinely unhealthy service: after the last attempt this fails the job.
          code=000
          for attempt in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "${URL}/health" || echo 000)
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "${URL}/health -> HTTP ${code}"
              exit 0
            fi
            echo "::warning::Attempt ${attempt}: ${URL}/health -> HTTP ${code}. Retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
          done

          echo "::error::${{ matrix.cloud_run_service }} deployed but ${URL}/health returned HTTP ${code} after 5 attempts."
          exit 1