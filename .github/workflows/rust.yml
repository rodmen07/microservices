name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Lint & test ────────────────────────────────────────────────────────────
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install sqlite3 + PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends sqlite3 postgresql-client

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            sleep 1
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Create PostgreSQL test databases
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE accounts_test;" || true
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE activities_test;" || true
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE contacts_test;" || true

      # Services using sqlx compile-time macros need a live schema at build time.
      # We replicate the Dockerfile pattern: create a temp DB per service.
      - name: Create test databases
        run: |
          sqlite3 /tmp/activities.db    < activities-service/migrations/0001_create_activities.sql
          sqlite3 /tmp/workflows.db     < automation-service/migrations/0001_create_workflows.sql
          sqlite3 /tmp/connections.db   < integrations-service/migrations/0001_create_connections.sql
          sqlite3 /tmp/opportunities.db < opportunities-service/migrations/0001_create_opportunities.sql
          sqlite3 /tmp/reports.db       < reporting-service/migrations/0001_create_reports.sql
          sqlite3 /tmp/documents.db     < search-service/migrations/0001_create_search_documents.sql

      # Clippy for SQLite-backed services
      - name: Clippy — SQLite-backed services
        run: |
          DATABASE_URL=sqlite:////tmp/workflows.db     cargo clippy -p automation-service    -- -D warnings
          DATABASE_URL=sqlite:////tmp/connections.db   cargo clippy -p integrations-service  -- -D warnings
          DATABASE_URL=sqlite:////tmp/opportunities.db cargo clippy -p opportunities-service -- -D warnings
          DATABASE_URL=sqlite:////tmp/reports.db       cargo clippy -p reporting-service     -- -D warnings
          DATABASE_URL=sqlite:////tmp/documents.db     cargo clippy -p search-service        -- -D warnings

      # Postgres-backed services use runtime sqlx queries — no DB needed at compile time
      - name: Clippy — Postgres-backed services
        run: cargo clippy -p accounts-service -p activities-service -p contacts-service -- -D warnings

      # Run tests per-service so each gets the right DATABASE_URL
      - name: Test — SQLite-backed services
        env:
          AUTH_JWT_SECRET: dev-insecure-secret-change-me
        run: |
          DATABASE_URL=sqlite:////tmp/workflows.db     cargo test -p automation-service
          DATABASE_URL=sqlite:////tmp/connections.db   cargo test -p integrations-service
          DATABASE_URL=sqlite:////tmp/opportunities.db cargo test -p opportunities-service
          DATABASE_URL=sqlite:////tmp/reports.db       cargo test -p reporting-service
          DATABASE_URL=sqlite:////tmp/documents.db     cargo test -p search-service

      - name: Test — Postgres-backed services
        env:
          AUTH_JWT_SECRET: dev-insecure-secret-change-me
        run: |
          TEST_DATABASE_URL=postgres://postgres:postgres@localhost:5432/accounts_test \
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/accounts_test \
          cargo test -p accounts-service

          TEST_DATABASE_URL=postgres://postgres:postgres@localhost:5432/activities_test \
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/activities_test \
          cargo test -p activities-service

          TEST_DATABASE_URL=postgres://postgres:postgres@localhost:5432/contacts_test \
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/contacts_test \
          cargo test -p contacts-service

  # ─── Dependency security audit ──────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        # RUSTSEC-2023-0071: rsa Marvin Attack — no patch available in rsa 0.9.x.
        # All services default to HS256; RSA is only used for token verification
        # on controlled infrastructure. Risk accepted until upstream ships a fix.
        run: cargo audit --ignore RUSTSEC-2023-0071

  # ─── Deploy to Google Cloud Run (main branch only) ─────────────────────────
  #
  # Required GitHub configuration:
  # - Repository variable GCP_PROJECT_ID: target Google Cloud project ID
  # - GCP_SA_KEY: JSON key for a service account that can:
  #     * push to Artifact Registry
  #     * deploy Cloud Run services
  #
  # Services are deployed in parallel after tests pass.
  deploy:
    name: Deploy ${{ matrix.service }}
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false   # one service failing doesn't abort the others
      matrix:
        include:
          - service: accounts-service
            dockerfile: accounts-service/Dockerfile
            cloud_run_service: accounts-service
          - service: contacts-service
            dockerfile: contacts-service/Dockerfile
            cloud_run_service: contacts-service
          - service: activities-service
            dockerfile: activities-service/Dockerfile
            cloud_run_service: activities-service
          - service: automation-service
            dockerfile: automation-service/Dockerfile
            cloud_run_service: automation-service
          - service: integrations-service
            dockerfile: integrations-service/Dockerfile
            cloud_run_service: integrations-service
          - service: opportunities-service
            dockerfile: opportunities-service/Dockerfile
            cloud_run_service: opportunities-service
          - service: reporting-service
            dockerfile: reporting-service/Dockerfile
            cloud_run_service: reporting-service
          - service: search-service
            dockerfile: search-service/Dockerfile
            cloud_run_service: search-service

    env:
      GCP_REGION: us-south1
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy configuration
        id: deploy_config
        run: |
          if [ -z "${{ env.GCP_PROJECT_ID }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy: repository variable GCP_PROJECT_ID is not set."
            exit 0
          fi

          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy: repository secret GCP_SA_KEY is not set."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Deploy configuration diagnostics
        run: |
          if [ -n "${{ env.GCP_PROJECT_ID }}" ]; then
            echo "GCP_PROJECT_ID: present"
          else
            echo "GCP_PROJECT_ID: missing"
          fi

          echo "GCP_SA_KEY: ${HAS_GCP_SA_KEY}"
          echo "Deploy enabled: ${{ steps.deploy_config.outputs.enabled }}"
        env:
          HAS_GCP_SA_KEY: ${{ secrets.GCP_SA_KEY != '' }}

      - name: Authenticate to Google Cloud
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up gcloud
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: steps.deploy_config.outputs.enabled == 'true'
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/microservices/${{ matrix.service }}:${{ github.sha }}"
          docker build -f "${{ matrix.dockerfile }}" -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        if: steps.deploy_config.outputs.enabled == 'true'
        run: |
          gcloud run deploy "${{ matrix.cloud_run_service }}" \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --quiet
