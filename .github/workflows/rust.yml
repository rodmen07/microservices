name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create combined SQLite database for sqlx compile-time checks
      run: |
        for svc in accounts-service contacts-service opportunities-service \
                   activities-service automation-service integrations-service \
                   search-service reporting-service; do
          cat $svc/migrations/*.sql
        done | sqlite3 workspace.db

    - name: Build
      env:
        DATABASE_URL: sqlite://workspace.db
      run: cargo build --verbose

    - name: Run tests
      env:
        DATABASE_URL: sqlite://workspace.db
      run: cargo test --verbose
