openapi: 3.0.3
info:
  title: reporting-service API
  version: 1.16.1
  description: |
    CRM reporting service for the InfraPortal platform. Rust (axum 0.8) with
    PostgreSQL persistence. Provides CRUD on saved report definitions, CSV and
    JSON export, and dashboard aggregates that combine local report counts
    with totals fetched live from the accounts, contacts, opportunities, and
    activities services, plus health and readiness probes.

    This spec documents the API contract as implemented in code
    (src/lib/router.rs, src/lib/handlers/, src/lib/models.rs, src/lib/auth.rs).
    All runtime endpoints have been offline since 2026-06-04, when the platform
    infrastructure was decommissioned to zero. See ROADMAP.md in the repo root.

    Authentication: every /api/v1 route, including /api/v1/dashboard, validates
    a bearer JWT in the handler and additionally requires the "admin" role.
    /health and /ready are unauthenticated. Requests without a valid token
    receive 401; valid tokens without the admin role receive 403 with body
    {"code": "FORBIDDEN", "message": "admin role required"}. Because the admin
    role is required on every route, the owner-scoped (non-admin) query
    branches that exist in the handlers are unreachable on this branch: every
    authorized caller sees all reports.

    Error envelope: service-generated errors use the ApiError shape
    {"code", "message", "details?"}. Framework-generated rejections (malformed
    JSON, JSON body that fails deserialization, duplicated query parameters)
    are produced by axum before the handler runs and have text/plain bodies;
    they are documented per operation below. Body-validation failures in the
    create and update handlers return 422 with the ApiError envelope and code
    VALIDATION_ERROR; the export format check is the one handler-level 400,
    with code INVALID_FORMAT.

    Rate limiting: enforced at the platform gateway (go-gateway, shipped in
    v1.10), not in this service. The gateway sets X-RateLimit-Limit,
    X-RateLimit-Remaining, and X-RateLimit-Reset on every proxied response and
    adds Retry-After on 429. Platform tiers: auth routes 5 rps, write routes
    30 rps, read routes 60 rps, per client IP per route. Requests sent directly
    to the service bypass the gateway and carry none of these headers.
  contact:
    name: InfraPortal platform
externalDocs:
  description: "Platform API getting-started guide"
  url: "https://github.com/rodmen07/microservices/blob/main/docs/API.md"
servers:
  - url: "https://reporting-service-5gcrg4oiza-uc.a.run.app"
    description: "Historical Cloud Run deployment. Offline since 2026-06-04."
  - url: "http://localhost:8080"
    description: "Local development (default HOST 0.0.0.0, default PORT 8080)."
tags:
  - name: Health
    description: "Liveness and readiness probes. Unauthenticated."
  - name: Dashboard
    description: "Aggregated dashboard views. Requires a bearer JWT with the admin role."
  - name: Reports
    description: "Saved report CRUD and export. Requires a bearer JWT with the admin role."
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: |
        Returns service health. The handler runs a database ping (SELECT 1),
        so a failing database returns 503 with status "degraded" and an error
        string. No authentication required.
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is up and the database ping succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
        "503":
          description: Database ping failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: degraded
                error: "pool timed out while waiting for an open connection"
  /ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: |
        Wired to the same handler as /health, so readiness and liveness are
        currently identical: both run the database ping. No authentication
        required.
      operationId: readinessCheck
      security: []
      responses:
        "200":
          description: Service is ready and the database ping succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
        "503":
          description: Database ping failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: degraded
                error: "pool timed out while waiting for an open connection"
  /api/v1/dashboard:
    get:
      tags:
        - Dashboard
      summary: Get the cross-service dashboard view
      description: |
        Aggregates the local reports count and distinct metric list with entity
        totals fetched from sibling services (accounts, contacts,
        opportunities, activities). Each sibling total is null when the
        corresponding *_SERVICE_URL environment variable is unset or empty,
        when the downstream call returns a non-2xx status, or when the
        downstream body carries no numeric "total" field. The caller's Authorization header is
        forwarded verbatim to the sibling services.

        When user_id is given, the reports count and the owner_id filter sent
        to sibling services are scoped to that user; core_metrics is never
        scoped. Query parameters are read as free-form strings, so there is no
        typed query rejection on this route; unknown parameters are ignored.

        stage_distribution and recent_activities are reserved fields that the
        handler hardcodes to null on this branch. Requires the admin role.
        Read tier: 60 rps at the gateway.
      operationId: getDashboard
      parameters:
        - name: user_id
          in: query
          required: false
          description: |
            Scope the reports count and the downstream owner_id filters to
            this user ID. When omitted, counts are platform-wide.
          schema:
            type: string
          example: "7d4e2f10-9c8b-4a5d-b6e3-2f1a0c9d8e7b"
      responses:
        "200":
          description: Aggregated dashboard view.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardView"
              example:
                accounts: 42
                contacts: 128
                opportunities: 17
                activities: 356
                reports: 6
                core_metrics:
                  - "accounts.total"
                  - "opportunities.pipeline_value"
                  - "opportunities.won_count"
                stage_distribution: null
                recent_activities: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          description: |
            A local database query failed (DB_ERROR), a sibling service
            request could not be sent (HTTP_ERROR "service request failed"),
            or a sibling service replied 2xx with a body that was not valid
            JSON (HTTP_ERROR "invalid service response").
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                dbError:
                  summary: Local database query failed
                  value:
                    code: DB_ERROR
                    message: "database error"
                requestFailed:
                  summary: Sibling service request could not be sent
                  value:
                    code: HTTP_ERROR
                    message: "service request failed"
                invalidResponse:
                  summary: Sibling service returned a non-JSON body
                  value:
                    code: HTTP_ERROR
                    message: "invalid service response"
  /api/v1/reports/dashboard:
    get:
      tags:
        - Dashboard
      summary: Get the reports dashboard summary
      description: |
        Returns the total number of saved reports (active_reports) and the
        sorted list of distinct metric names in use (core_metrics). Because
        every caller must hold the admin role, the counts always cover all
        reports. Requires the admin role. Read tier: 60 rps at the gateway.
      operationId: getDashboardSummary
      responses:
        "200":
          description: Reports summary.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
              example:
                active_reports: 6
                core_metrics:
                  - "accounts.total"
                  - "opportunities.pipeline_value"
                  - "opportunities.won_count"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/reports:
    get:
      tags:
        - Reports
      summary: List saved reports
      description: |
        Returns every saved report ordered by created_at descending, as a bare
        JSON array. There is no pagination and no envelope (no total, limit,
        or offset fields), and the handler accepts no query parameters; any
        query string is ignored. Requires the admin role, so the full table is
        returned. Read tier: 60 rps at the gateway.
      operationId: listReports
      responses:
        "200":
          description: All saved reports, newest first.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedReport"
              example:
                - id: "9c1f4b3a-2d5e-4f7a-8b0c-3e6d9f2a1c4b"
                  name: "Pipeline value by stage"
                  description: "Weekly pipeline value breakdown for the sales dashboard"
                  metric: "opportunities.pipeline_value"
                  dimension: "stage"
                  created_at: "2026-07-18T14:30:00Z"
                  updated_at: "2026-07-18T14:30:00Z"
                - id: "5a2b8c1d-7e4f-4a6b-9c0d-1f3e5a7b9c2d"
                  name: "Won deals by owner"
                  description: null
                  metric: "opportunities.won_count"
                  dimension: "owner"
                  created_at: "2026-07-01T09:15:00Z"
                  updated_at: "2026-07-10T11:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Reports
      summary: Create a saved report
      description: |
        Creates a saved report owned by the caller (owner_id is taken from the
        JWT sub claim; it is stored but never serialized in responses). name
        and metric are trimmed and must be non-empty and at most 255
        characters; description is limited to 1000 characters and dimension to
        255. description and dimension are stored exactly as sent (they are
        not trimmed on create). Length checks are byte counts. Handler
        validation failures return 422 with the ApiError envelope. Requires
        the admin role. Write tier: 30 rps at the gateway.
      operationId: createReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
            example:
              name: "Pipeline value by stage"
              description: "Weekly pipeline value breakdown for the sales dashboard"
              metric: "opportunities.pipeline_value"
              dimension: "stage"
      responses:
        "201":
          description: Report created.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedReport"
              example:
                id: "9c1f4b3a-2d5e-4f7a-8b0c-3e6d9f2a1c4b"
                name: "Pipeline value by stage"
                description: "Weekly pipeline value breakdown for the sales dashboard"
                metric: "opportunities.pipeline_value"
                dimension: "stage"
                created_at: "2026-07-18T14:30:00Z"
                updated_at: "2026-07-18T14:30:00Z"
        "400":
          description: |
            Malformed JSON syntax. Generated by the axum Json extractor before
            the handler runs, so it can occur even without a valid token; the
            body is text/plain, not the ApiError envelope.
          content:
            text/plain:
              schema:
                type: string
              example: "Failed to parse the request body as JSON: expected value at line 1 column 1"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: |
            Handler validation failure (application/json, ApiError envelope
            with code VALIDATION_ERROR), or a JSON body that parsed but failed
            deserialization into the request type, for example a missing
            required field or a wrong type (text/plain, generated by the axum
            Json extractor before the handler runs).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                emptyName:
                  summary: Name empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "name must not be empty"
                    details:
                      field: name
                      constraint: "must not be empty"
                nameTooLong:
                  summary: Name longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "name exceeds maximum length of 255 characters"
                    details:
                      field: name
                      constraint: "max 255 characters"
                emptyMetric:
                  summary: Metric empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "metric must not be empty"
                    details:
                      field: metric
                      constraint: "must not be empty"
                metricTooLong:
                  summary: Metric longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "metric exceeds maximum length of 255 characters"
                    details:
                      field: metric
                      constraint: "max 255 characters"
                descriptionTooLong:
                  summary: Description longer than 1000 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "description exceeds maximum length of 1000 characters"
                    details:
                      field: description
                      constraint: "max 1000 characters"
                dimensionTooLong:
                  summary: Dimension longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "dimension exceeds maximum length of 255 characters"
                    details:
                      field: dimension
                      constraint: "max 255 characters"
            text/plain:
              schema:
                type: string
              example: "Failed to deserialize the JSON body into the target type: missing field `name` at line 1 column 2"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/reports/export:
    get:
      tags:
        - Reports
      summary: Export reports as CSV or JSON
      description: |
        Exports saved reports as a downloadable attachment, ordered by
        created_at descending. format selects csv or json (default json,
        matched case-insensitively; any other value returns 400 with code
        INVALID_FORMAT). Optional filters: metric (exact, case-sensitive
        equality), created_after and created_before (plain string comparison
        against the stored created_at text, so pass full timestamps in
        %Y-%m-%dT%H:%M:%SZ format; the values are not parsed or validated).
        All query parameters are read as optional strings, so wrong-type
        query rejections cannot occur; the only Query extractor rejection is
        a duplicated parameter (for example format given twice), which
        returns 400 with a text/plain body. Requires the admin role, so all
        reports are exported. Read tier: 60 rps at the gateway.
      operationId: exportReports
      parameters:
        - name: format
          in: query
          required: false
          description: "Export format. Case-insensitive; defaults to json when omitted."
          schema:
            type: string
            enum:
              - csv
              - json
            default: json
        - name: metric
          in: query
          required: false
          description: "Only include reports whose metric equals this value exactly."
          schema:
            type: string
          example: "opportunities.pipeline_value"
        - name: created_after
          in: query
          required: false
          description: |
            Only include reports whose created_at is greater than or equal to
            this value (string comparison against the stored text).
          schema:
            type: string
          example: "2026-07-01T00:00:00Z"
        - name: created_before
          in: query
          required: false
          description: |
            Only include reports whose created_at is less than or equal to
            this value (string comparison against the stored text).
          schema:
            type: string
          example: "2026-07-18T23:59:59Z"
      responses:
        "200":
          description: |
            Export payload. Content type and file extension follow the format
            parameter; both variants set Content-Disposition to an attachment
            named reports-export-YYYYMMDD (UTC date). The JSON variant is a
            pretty-printed array of SavedReport objects.
          headers:
            Content-Disposition:
              description: |
                Always present. attachment with filename
                reports-export-YYYYMMDD.csv or reports-export-YYYYMMDD.json,
                where YYYYMMDD is the current UTC date.
              schema:
                type: string
              example: "attachment; filename=\"reports-export-20260718.json\""
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedReport"
              example:
                - id: "9c1f4b3a-2d5e-4f7a-8b0c-3e6d9f2a1c4b"
                  name: "Pipeline value by stage"
                  description: "Weekly pipeline value breakdown for the sales dashboard"
                  metric: "opportunities.pipeline_value"
                  dimension: "stage"
                  created_at: "2026-07-18T14:30:00Z"
                  updated_at: "2026-07-18T14:30:00Z"
            text/csv:
              schema:
                type: string
                description: "CSV with header row: id,name,description,metric,dimension,created_at,updated_at. Null description or dimension become empty cells."
              example: |
                id,name,description,metric,dimension,created_at,updated_at
                9c1f4b3a-2d5e-4f7a-8b0c-3e6d9f2a1c4b,Pipeline value by stage,Weekly pipeline value breakdown for the sales dashboard,opportunities.pipeline_value,stage,2026-07-18T14:30:00Z,2026-07-18T14:30:00Z
        "400":
          description: |
            format was neither csv nor json (ApiError envelope, generated by
            the handler), or a query parameter was duplicated (text/plain,
            generated by the axum Query extractor before the handler runs).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                code: INVALID_FORMAT
                message: "format must be 'csv' or 'json'"
                details:
                  field: format
                  valid_values:
                    - csv
                    - json
            text/plain:
              schema:
                type: string
              example: "Failed to deserialize query string: duplicate field `format`"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          description: |
            A database query failed (DB_ERROR) or the export payload could not
            be built (EXPORT_ERROR).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                dbError:
                  summary: Database query failed
                  value:
                    code: DB_ERROR
                    message: "database error"
                csvHeader:
                  summary: CSV header write failed
                  value:
                    code: EXPORT_ERROR
                    message: "failed to write CSV header"
                csvRow:
                  summary: CSV row write failed
                  value:
                    code: EXPORT_ERROR
                    message: "failed to write CSV row"
                csvFinalize:
                  summary: CSV buffer finalize failed
                  value:
                    code: EXPORT_ERROR
                    message: "failed to finalize CSV"
                jsonSerialize:
                  summary: JSON serialization failed
                  value:
                    code: EXPORT_ERROR
                    message: "failed to serialize JSON"
  /api/v1/reports/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: "Report ID (UUID v4, stored as TEXT)."
        schema:
          type: string
          format: uuid
        example: "9c1f4b3a-2d5e-4f7a-8b0c-3e6d9f2a1c4b"
    get:
      tags:
        - Reports
      summary: Get a saved report
      description: |
        Fetches a single saved report by ID. Returns 404 when no report with
        that ID exists. Requires the admin role. Read tier: 60 rps at the
        gateway.
      operationId: getReport
      responses:
        "200":
          description: The requested report.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedReport"
              example:
                id: "9c1f4b3a-2d5e-4f7a-8b0c-3e6d9f2a1c4b"
                name: "Pipeline value by stage"
                description: "Weekly pipeline value breakdown for the sales dashboard"
                metric: "opportunities.pipeline_value"
                dimension: "stage"
                created_at: "2026-07-18T14:30:00Z"
                updated_at: "2026-07-18T14:30:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - Reports
      summary: Update a saved report
      description: |
        Partial update. Omitted fields (and fields sent as JSON null) keep
        their stored values. name and metric are trimmed; an empty or
        whitespace-only value for either is rejected with 422. description and
        dimension are trimmed on update, and an empty string is stored as an
        empty string, so there is no way to clear either field back to null.
        The existence check runs before field validation, so a body that
        deserializes but would fail validation still returns 404 when the ID
        does not exist (a body the Json extractor rejects returns 400 or 422
        before the handler runs). updated_at is refreshed on success. Requires
        the admin role. Write tier: 30 rps at the gateway.
      operationId: updateReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReportRequest"
            example:
              dimension: "owner"
      responses:
        "200":
          description: The updated report.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedReport"
              example:
                id: "9c1f4b3a-2d5e-4f7a-8b0c-3e6d9f2a1c4b"
                name: "Pipeline value by stage"
                description: "Weekly pipeline value breakdown for the sales dashboard"
                metric: "opportunities.pipeline_value"
                dimension: "owner"
                created_at: "2026-07-18T14:30:00Z"
                updated_at: "2026-07-18T16:45:00Z"
        "400":
          description: |
            Malformed JSON syntax. Generated by the axum Json extractor before
            the handler runs, so it can occur even without a valid token; the
            body is text/plain, not the ApiError envelope.
          content:
            text/plain:
              schema:
                type: string
              example: "Failed to parse the request body as JSON: expected value at line 1 column 1"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: |
            Handler validation failure (application/json, ApiError envelope
            with code VALIDATION_ERROR), or a JSON body that parsed but failed
            deserialization into the request type, for example a wrong field
            type (text/plain, generated by the axum Json extractor before the
            handler runs).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                emptyName:
                  summary: Name provided but empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "name cannot be empty"
                    details:
                      field: name
                      constraint: "must not be empty"
                nameTooLong:
                  summary: Name longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "name exceeds maximum length of 255 characters"
                    details:
                      field: name
                      constraint: "max 255 characters"
                emptyMetric:
                  summary: Metric provided but empty after trimming
                  value:
                    code: VALIDATION_ERROR
                    message: "metric cannot be empty"
                    details:
                      field: metric
                      constraint: "must not be empty"
                metricTooLong:
                  summary: Metric longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "metric exceeds maximum length of 255 characters"
                    details:
                      field: metric
                      constraint: "max 255 characters"
                descriptionTooLong:
                  summary: Description longer than 1000 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "description exceeds maximum length of 1000 characters"
                    details:
                      field: description
                      constraint: "max 1000 characters"
                dimensionTooLong:
                  summary: Dimension longer than 255 characters
                  value:
                    code: VALIDATION_ERROR
                    message: "dimension exceeds maximum length of 255 characters"
                    details:
                      field: dimension
                      constraint: "max 255 characters"
            text/plain:
              schema:
                type: string
              example: "Failed to deserialize the JSON body into the target type: invalid type: integer `7`, expected a string at line 1 column 11"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Reports
      summary: Delete a saved report
      description: |
        Deletes a saved report by ID. Returns 204 with no body on success, 404
        when no row was deleted. Requires the admin role. Write tier: 30 rps
        at the gateway.
      operationId: deleteReport
      responses:
        "204":
          description: Report deleted. No response body.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer JWT issued by auth-service. Validated in-handler with HS256 by
        default (AUTH_JWT_ALGORITHM also accepts HS384, HS512, RS256, RS384,
        RS512). The token must carry an exp claim and an iss claim matching
        AUTH_ISSUER (default "auth-service"). The sub claim is required and
        identifies the caller (a token without sub fails validation); the
        roles claim (array of strings, case-insensitive, defaults to empty)
        must include "admin" for every /api/v1 route in this service.
  schemas:
    SavedReport:
      type: object
      description: |
        A saved report definition. IDs and timestamps are stored as TEXT. The
        owner_id column exists in the database but is never serialized in
        responses. description and dimension are serialized as null when
        unset, never omitted.
      required:
        - id
        - name
        - description
        - metric
        - dimension
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: "Report ID, a UUID v4 generated at creation."
          example: "9c1f4b3a-2d5e-4f7a-8b0c-3e6d9f2a1c4b"
        name:
          type: string
          maxLength: 255
          description: "Report display name. Trimmed, non-empty, at most 255 characters."
          example: "Pipeline value by stage"
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: "Free-text description. Null when not set."
          example: "Weekly pipeline value breakdown for the sales dashboard"
        metric:
          type: string
          maxLength: 255
          description: "Metric identifier the report tracks. Trimmed, non-empty, at most 255 characters."
          example: "opportunities.pipeline_value"
        dimension:
          type: string
          nullable: true
          maxLength: 255
          description: "Optional grouping dimension. Null when not set."
          example: "stage"
        created_at:
          type: string
          format: date-time
          description: "Creation timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision)."
          example: "2026-07-18T14:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: "Last update timestamp, UTC, formatted %Y-%m-%dT%H:%M:%SZ (second precision)."
          example: "2026-07-18T14:30:00Z"
    CreateReportRequest:
      type: object
      required:
        - name
        - metric
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: "Report display name. Trimmed server-side; must be non-empty after trimming. Length checked in bytes."
          example: "Pipeline value by stage"
        description:
          type: string
          nullable: true
          maxLength: 1000
          description: "Free-text description, at most 1000 characters. Stored exactly as sent (not trimmed on create)."
          example: "Weekly pipeline value breakdown for the sales dashboard"
        metric:
          type: string
          minLength: 1
          maxLength: 255
          description: "Metric identifier. Trimmed server-side; must be non-empty after trimming. Length checked in bytes."
          example: "opportunities.pipeline_value"
        dimension:
          type: string
          nullable: true
          maxLength: 255
          description: "Optional grouping dimension, at most 255 characters. Stored exactly as sent (not trimmed on create)."
          example: "stage"
    UpdateReportRequest:
      type: object
      description: |
        Partial update. Every field is optional; omitted fields (and fields
        sent as JSON null) keep their stored values. There is no way to clear
        description or dimension back to null.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: "New display name. Trimmed; an empty or whitespace-only value is rejected with 422."
          example: "Pipeline value by stage"
        description:
          type: string
          maxLength: 1000
          description: "New description. Trimmed; an empty string is stored as an empty string, not null."
          example: "Weekly pipeline value breakdown for the sales dashboard"
        metric:
          type: string
          minLength: 1
          maxLength: 255
          description: "New metric identifier. Trimmed; an empty or whitespace-only value is rejected with 422."
          example: "opportunities.won_count"
        dimension:
          type: string
          maxLength: 255
          description: "New grouping dimension. Trimmed; an empty string is stored as an empty string, not null."
          example: "owner"
    DashboardSummary:
      type: object
      required:
        - active_reports
        - core_metrics
      properties:
        active_reports:
          type: integer
          format: int64
          description: "Total number of saved reports."
          example: 6
        core_metrics:
          type: array
          items:
            type: string
          description: "Distinct metric names in use, sorted ascending."
          example:
            - "accounts.total"
            - "opportunities.pipeline_value"
            - "opportunities.won_count"
    DashboardView:
      type: object
      description: |
        Cross-service dashboard aggregate. Every field is always serialized;
        nullable fields are null rather than omitted.
      required:
        - accounts
        - contacts
        - opportunities
        - activities
        - reports
        - core_metrics
        - stage_distribution
        - recent_activities
      properties:
        accounts:
          type: integer
          format: int64
          nullable: true
          description: "Account total from accounts-service. Null when ACCOUNTS_SERVICE_URL is unset or empty, the call returned non-2xx, or the body had no numeric total."
          example: 42
        contacts:
          type: integer
          format: int64
          nullable: true
          description: "Contact total from contacts-service. Null under the same conditions as accounts."
          example: 128
        opportunities:
          type: integer
          format: int64
          nullable: true
          description: "Opportunity total from opportunities-service. Null under the same conditions as accounts."
          example: 17
        activities:
          type: integer
          format: int64
          nullable: true
          description: "Activity total from activities-service. Null under the same conditions as accounts."
          example: 356
        reports:
          type: integer
          format: int64
          description: "Saved report count from this service, scoped by user_id when provided."
          example: 6
        core_metrics:
          type: array
          items:
            type: string
          description: "Distinct metric names across all reports, sorted ascending. Never scoped by user_id."
          example:
            - "accounts.total"
            - "opportunities.pipeline_value"
            - "opportunities.won_count"
        stage_distribution:
          type: object
          additionalProperties:
            type: integer
            format: int64
          nullable: true
          description: "Reserved. The handler hardcodes this to null on this branch."
          example: null
        recent_activities:
          type: array
          items: {}
          nullable: true
          description: "Reserved. The handler hardcodes this to null on this branch."
          example: null
    ExportQuery:
      type: object
      description: "Query parameters accepted by exportReports, shown here for reference."
      properties:
        format:
          type: string
          enum:
            - csv
            - json
          default: json
        metric:
          type: string
        created_after:
          type: string
        created_before:
          type: string
    ApiError:
      type: object
      description: "Standard platform error envelope. details is omitted when absent, never null."
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: "Machine-readable error code."
          example: VALIDATION_ERROR
        message:
          type: string
          description: "Human-readable error message."
          example: "name must not be empty"
        details:
          description: "Optional structured context, for example the offending field and constraint."
          example:
            field: name
            constraint: "must not be empty"
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
          example: ok
        error:
          type: string
          description: "Database error string. Present only when status is degraded."
          example: "pool timed out while waiting for an open connection"
  headers:
    XRateLimitLimit:
      description: |
        Requests per second allowed for the matched route tier, per client IP.
        Platform tiers (enforced by go-gateway since v1.10): auth 5 rps,
        write 30 rps, read 60 rps. Absent when the service is called directly
        without the gateway.
      schema:
        type: integer
      example: 60
    XRateLimitRemaining:
      description: "Requests remaining in the current token bucket for this client and route tier."
      schema:
        type: integer
      example: 59
    XRateLimitReset:
      description: "Unix epoch second at which the bucket refills."
      schema:
        type: integer
        format: int64
      example: 1784822400
  responses:
    Unauthorized:
      description: "Missing, malformed, or invalid bearer token."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            missingHeader:
              summary: No Authorization header
              value:
                code: AUTH_REQUIRED
                message: "authorization header is required"
            invalidFormat:
              summary: Header is not exactly Bearer plus one token
              value:
                code: AUTH_INVALID_FORMAT
                message: "authorization header format must be 'Bearer <token>'"
            invalidToken:
              summary: Signature, expiry, or issuer validation failed
              value:
                code: AUTH_INVALID_TOKEN
                message: "token validation failed"
    Forbidden:
      description: "Token is valid but the roles claim does not include admin."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: FORBIDDEN
            message: "admin role required"
    NotFound:
      description: "No report with the given ID exists."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: NOT_FOUND
            message: "report not found"
    RateLimited:
      description: |
        Rate limit exceeded for the matched route tier. Returned by go-gateway,
        not by this service; direct calls to the service are never rate
        limited. The body follows the ApiError envelope without details.
      headers:
        Retry-After:
          description: "Seconds to wait before retrying."
          schema:
            type: integer
          example: 1
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: RATE_LIMITED
            message: "rate limit exceeded (30 req/s), retry after 1s"
    InternalError:
      description: "A database query failed."
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: DB_ERROR
            message: "database error"
